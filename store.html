<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subuluke Store</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
THEME
========================= */

:root{
--bg:#FFF8E7;
--text:#333;
--accent:#E6A520;
--softGold:#FFD77A;
}

body.dark{
--bg:#0F0F0F;
--text:#F5F5F5;
}

/* =========================
BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Poppins",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.5;
}

/* =========================
HEADER
========================= */

.header{
position:sticky;
top:0;
z-index:1000;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,0.15);
padding:12px 20px;
}

body.dark .header{
background:rgba(20,20,20,0.65);
}

.header-inner{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:700;
font-size:22px;
letter-spacing:1px;
}

.header-icons{
display:flex;
gap:18px;
align-items:center;
}

.icon{
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:var(--text);
position:relative;
}

/* CART BADGE */

.cart-count{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:#fff;
font-size:12px;
font-weight:700;
width:18px;
height:18px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

/* =========================
RESPONSIVE NAV
========================= */

#menuBtn{
display:none;
}

@media(max-width:768px){

#menuBtn{
display:block;
}

.category-pills{
display:none;
}

}

/* =========================
CATEGORY PILLS
========================= */

.category-pills{
max-width:1200px;
margin:20px auto;
display:flex;
gap:10px;
flex-wrap:wrap;
padding:0 20px;
}

.category-pill{
padding:8px 18px;
border-radius:999px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(8px);
cursor:pointer;
font-size:14px;
transition:.3s;
}

.category-pill:hover{
background:var(--softGold);
color:#000;
}

.category-pill.active{
background:var(--accent);
color:#fff;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(16px);
padding:20px;
transition:.4s;
z-index:1200;
overflow-y:auto;
border-right:1px solid rgba(0,0,0,0.1);
}

body.dark .sidebar{
background:rgba(20,20,20,0.6);
border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar.open{
left:0;
}

.sidebar h3{
margin-bottom:12px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:10px 0;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar li:hover{
color:var(--accent);
}

/* =========================
PRODUCT GRID
========================= */

.products{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

@media(max-width:1024px){
.products{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:600px){
.products{grid-template-columns:repeat(2,1fr);}
}

/* =========================
PRODUCT CARD
========================= */

.product-card{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(14px);
border-radius:18px;
border: 2px solid;
padding:14px;
border:1px solid rgba(255,255,255,0.35);
display:flex;
flex-direction:column;
gap:10px;
position:relative;
transition:.3s;
}

body.dark .product-card{
background:rgba(20,20,20,0.55);
border:2px solid rgba(255,255,255,0.08);
}

.product-card:hover{
transform:translateY(-6px);
box-shadow:0 16px 32px rgba(0,0,0,0.18);
}

.product-card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:14px;
cursor:zoom-in;
}

.product-category{
font-size:12px;
text-transform:uppercase;
color:var(--softGold);
}

.product-name{
font-size:16px;
font-weight:600;
}

.price{
display:flex;
gap:6px;
}

.old-price{
text-decoration:line-through;
font-size:13px;
opacity:.7;
}

.new-price{
font-weight:700;
color:var(--accent);
}

.add-cart{
margin-top:auto;
padding:8px;
border:none;
border-radius:12px;
background:var(--accent);
color:#fff;
font-weight:600;
cursor:pointer;
}

.add-cart:hover:not(.disabled){
background:var(--softGold);
color:#000;
}

.add-cart.disabled{
opacity:.6;
cursor:not-allowed;
}

/* =========================
BADGES
========================= */

.badge{
position:absolute;
top:12px;
left:12px;
background:#fff;
color:#000;
padding:4px 8px;
font-size:11px;
font-weight:600;
border-radius:8px;
}

.badge.sale{
left:auto;
right:12px;
background:var(--accent);
color:#fff;
}

.badge.out{
top:42px;
left:12px;
background:red;
color:#fff;
}

/* =========================
IMAGE MODAL
========================= */

.image-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:.3s;
z-index:3000;
}

.image-modal.show{
opacity:1;
visibility:visible;
}

.image-modal img{
max-width:90%;
max-height:85vh;
border-radius:14px;
transform:scale(.8);
transition:.3s;
box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.image-modal.show img{
transform:scale(1);
}

/* =========================
PAGINATION
========================= */

.pagination{
display:flex;
justify-content:center;
gap:10px;
margin:30px 0;
}

.page-btn{
padding:8px 14px;
border:none;
cursor:pointer;
border-radius:8px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(8px);
}

/* =========================
TOAST
========================= */

#toast{
position:fixed;
bottom:20px;
right:20px;
background:var(--accent);
color:#fff;
padding:12px 20px;
border-radius:12px;
font-weight:600;
display:none;
z-index:2000;
}

</style>
</head>
<body>

<div id="sidebar" class="sidebar">
<h3>Categories</h3>
<ul id="sidebarCategories"></ul>
</div>

<header class="header">

<div class="header-inner">

<button class="icon" id="menuBtn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="logo">Subuluke</div>

<div class="header-icons">

<div class="icon cart-icon" onclick="window.location.href='cart.html'">
<i class="fa-solid fa-cart-shopping"></i>
<span id="cartCount" class="cart-count">0</span>
</div>

<button class="icon" onclick="toggleTheme()">
<i class="fa-solid fa-moon" id="moonIcon"></i>
<i class="fa-solid fa-sun" id="sunIcon" style="display:none"></i>
</button>

</div>

</div>

</header>

<div id="toast">Item added to cart</div>

<div id="categoryPills" class="category-pills"></div>

<div id="products" class="products"></div>

<div id="pagination" class="pagination"></div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="image-modal">
<img id="modalImage">
</div>

<script>

/* =========================
API
========================= */

const API="https://subuluke.onrender.com"

let allProducts=[]
let currentProducts=[]
let currentPage=1
let productsPerPage=10

/* =========================
THEME
========================= */

function toggleTheme(){

document.body.classList.toggle("dark")

localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light")

updateThemeIcon()

}

function updateThemeIcon(){

const moon=document.getElementById("moonIcon")
const sun=document.getElementById("sunIcon")

if(document.body.classList.contains("dark")){
moon.style.display="none"
sun.style.display="inline"
}else{
moon.style.display="inline"
sun.style.display="none"
}

}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark")
}

updateThemeIcon()

/* =========================
SIDEBAR
========================= */

const sidebar=document.getElementById("sidebar")

document.getElementById("menuBtn").onclick=()=>{
sidebar.classList.toggle("open")
}

document.addEventListener("click",e=>{
if(!sidebar.contains(e.target) && !e.target.closest("#menuBtn")){
sidebar.classList.remove("open")
}
})

/* =========================
LOAD PRODUCTS
========================= */

async function loadProducts(){

const res=await fetch(API+"/api/products")

allProducts=await res.json()

prepareProducts()

createCategories()

filterProducts("All")

}

/* =========================
SHUFFLE
========================= */

function shuffle(arr){

for(let i = arr.length - 1; i > 0; i--){

let j = Math.floor(Math.random() * (i + 1))

let temp = arr[i]
arr[i] = arr[j]
arr[j] = temp

}

return arr

}

function prepareProducts(){

let featured = shuffle(allProducts.filter(p=>p.featured))
let others = shuffle(allProducts.filter(p=>!p.featured))

allProducts = [...featured, ...others]

}

/* =========================
CATEGORIES
========================= */

function createCategories(){

const pills=document.getElementById("categoryPills")
const side=document.getElementById("sidebarCategories")

const cats=[...new Set(allProducts.map(p=>p.category))]

pills.innerHTML=`<div class="category-pill active" onclick="filterProducts('All')">All</div>`

side.innerHTML=""

cats.forEach(cat=>{

pills.innerHTML+=`<div class="category-pill" onclick="filterProducts('${cat}')">${cat}</div>`

side.innerHTML+=`<li onclick="filterProducts('${cat}')">${cat}</li>`

})

}

/* =========================
FILTER PRODUCTS
========================= */

function filterProducts(category){

currentPage=1

if(category==="All"){
currentProducts=allProducts
}else{
currentProducts=allProducts.filter(p=>p.category===category)
}

renderProducts(currentProducts)

window.scrollTo({top:0,behavior:"smooth"})

sidebar.classList.remove("open")

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(products){

const container=document.getElementById("products")

container.innerHTML=""

const start=(currentPage-1)*productsPerPage

const paginated=products.slice(start,start+productsPerPage)

paginated.forEach(p=>{

const out=p.status==="out_of_stall"

const card=document.createElement("div")

card.className="product-card"

card.innerHTML=`

<img src="${p.mainImage}" onclick="openImageModal('${p.mainImage}')">

${p.featured?'<div class="badge">⭐ FEATURED</div>':''}

${p.slashPrice>0?'<div class="badge sale">SALE</div>':''}

${out?'<div class="badge out">OUT OF STALL</div>':''}

<div class="product-category">${p.category}</div>

<div class="product-name">${p.name}</div>

<div class="price">

${p.slashPrice>0?`<span class="old-price">₦${Number(p.slashPrice).toLocaleString()}</span>`:''}

<span class="new-price">₦${Number(p.price).toLocaleString()}</span>

</div>

<button class="add-cart ${out?'disabled':''}" ${out?'disabled':''}
onclick="addToCart('${p._id}')">Add to Cart</button>

`

container.appendChild(card)

})

renderPagination(products.length)

}

/* =========================
PAGINATION
========================= */

function renderPagination(total){

const pages=Math.ceil(total/productsPerPage)

const container=document.getElementById("pagination")

container.innerHTML=""

for(let i=1;i<=pages;i++){

const btn=document.createElement("button")

btn.className="page-btn"

btn.innerText=i

btn.onclick=()=>goPage(i)

container.appendChild(btn)

}

}

function goPage(page){

currentPage=page

renderProducts(currentProducts)

window.scrollTo({top:0,behavior:"smooth"})

}

/* =========================
CART
========================= */

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart))

updateCartCount()

}

function addToCart(id){

const product=allProducts.find(p=>p._id===id)

if(!product) return

const existing=cart.find(item=>item._id===id)

if(existing){
existing.qty+=1
}else{

cart.push({
_id:product._id,
name:product.name,
price:product.price,
image:product.mainImage,
qty:1
})

}

saveCart()

showToast("Item added to cart")

}

function updateCartCount(){

const count=cart.reduce((sum,item)=>sum+item.qty,0)

const badge=document.getElementById("cartCount")

if(count===0){
badge.style.display="none"
}else{
badge.style.display="flex"
badge.innerText=count
}

}

/* =========================
TOAST
========================= */

function showToast(msg){

const toast=document.getElementById("toast")

toast.innerText=msg

toast.style.display="block"

setTimeout(()=>toast.style.display="none",2000)

}

/* =========================
IMAGE MODAL
========================= */

function openImageModal(src){

const modal=document.getElementById("imageModal")
const img=document.getElementById("modalImage")

img.src=src

modal.classList.add("show")

}

document.getElementById("imageModal").addEventListener("click",function(e){

if(e.target.id==="imageModal"){
this.classList.remove("show")
}

})

/* =========================
INIT
========================= */

updateCartCount()

loadProducts()

</script>

</body>
</html>
