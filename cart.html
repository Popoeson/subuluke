<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Subuluke</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-pzwR4T+vJZ5Zj7+8PmF1Jg8kHg1kSxkDixB0vQkTnX1Nc7Ju7xP5zvV8N/1dpb1HhG+Z7y6YbK6bl5W7nsS7Hw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
/* ========================= THEME ========================= */
:root{
  --bg:#FFF8E7;
  --header:#ffffff;
  --card:#ffffff;
  --text:#333;
  --muted:#777;
  --border:#eee;
  --accent:#E6A520;
  --softGold:#FFD77A;
  --shadow: rgba(0,0,0,0.12);
}

body.dark{
  --bg:#0F0F0F;
  --header:#121212;
  --card:#1A1A1A;
  --text:#F5F5F5;
  --muted:#BBBBBB;
  --border:#2A2A2A;
  --accent:#E6A520;
  --softGold:#FFD77A;
  --shadow: rgba(0,0,0,0.5);
}

/* ========================= BASE ========================= */
*{margin:0; padding:0; box-sizing:border-box;}
body{font-family:system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden;}

/* ========================= GLASSMORPHISM ========================= */
.glass{
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.3);
}

/* Dark mode glass */
body.dark .glass{
  background: rgba(26,26,26,0.4);
  border:1px solid rgba(255,255,255,0.1);
}

/* ========================= HEADER ========================= */
.header{
  position:sticky; top:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 20px; height:72px;
  box-shadow:0 4px 10px var(--shadow);
  z-index:1000;
}
.header-left, .header-right{display:flex; align-items:center; gap:12px;}
.logo{font-size:22px; font-weight:700;}

/* Glassmorphism applied */
.header-left, .header-right{
  padding:6px 10px;
  gap:12px;
}
.header-left.back-btn-container, .header-right.theme-toggle{
  border-radius:10px;
}

/* Back button */
.back-btn{
  background: rgba(255,255,255,0.3); /* semi-transparent */
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border:none; border-radius:10px;
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; color:var(--text);
  transition:0.2s;
}
body.dark .back-btn{background: rgba(26,26,26,0.5); color:#F5F5F5;}
.back-btn:hover{background: var(--softGold); color:#000;}

/* Theme toggle button */
.theme-toggle{
  display:flex; align-items:center; justify-content:center;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius:10px; padding:6px;
  cursor:pointer; font-size:18px; color:var(--accent); transition:0.2s;
}
body.dark .theme-toggle{background: rgba(26,26,26,0.5); color:var(--softGold);}
.theme-toggle:hover{color:var(--softGold);}

/* ========================= CART PAGE ========================= */
.cart-page{padding:25px 15px; max-width:960px; margin:auto;}
.cart-items{display:flex; flex-direction:column; gap:18px;}

/* CART ITEM - glass */
.cart-item{
  display:flex; gap:18px; align-items:center;
  padding:14px; border-radius:16px;
  background: rgba(255,248,231,0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.25);
  transition: transform 0.25s, box-shadow 0.25s;
}
body.dark .cart-item{
  background: rgba(26,26,26,0.4);
  border:1px solid rgba(255,255,255,0.1);
}
.cart-item:hover{transform: translateY(-3px); box-shadow:0 8px 20px var(--shadow);}

.cart-item img{width:70px; height:70px; object-fit:cover; border-radius:12px;}
.cart-details{flex:1;}
.cart-name{font-weight:700; font-size:16px; margin-bottom:6px;}
.cart-price{color: var(--accent); font-weight:600; font-size:15px;}

.cart-qty{display:flex; align-items:center; gap:12px;}
.cart-qty button{
  width:34px; height:34px; border:none; border-radius:8px;
  background: rgba(255,248,231,0.4);
  backdrop-filter: blur(8px);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-weight:600; font-size:14px; color:#000;
  transition:0.2s;
}
body.dark .cart-qty button{
  background: rgba(26,26,26,0.5);
  color:#F5F5F5;
}
.cart-qty button:hover{background: var(--softGold); transform: scale(1.1);}
.cart-qty span{min-width:20px; text-align:center; display:inline-block; font-weight:500; color: var(--text);}

/* CART SUMMARY - glass & smaller */
.cart-summary{
  margin-top:25px;
  text-align:center;
  padding:18px 15px;
  border-radius:14px;
  background: rgba(255,248,231,0.3);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.25);
  box-shadow:0 6px 14px var(--shadow);
  color:#000;
}
body.dark .cart-summary{
  background: rgba(26,26,26,0.5);
  border:1px solid rgba(255,255,255,0.1);
}

.cart-summary h2{font-size:20px; font-weight:700; margin-bottom:12px;}
.checkout-btn{
  padding:10px 22px; border:none; border-radius:10px;
  background: rgba(230,165,32,0.4);
  backdrop-filter: blur(8px);
  font-weight:700; cursor:pointer; font-size:14px;
  transition:0.2s;
}
.checkout-btn:hover{background:#FFD75A;}

/* EMPTY CART */
.empty-cart{text-align:center; margin-top:50px; color:var(--muted); display:none; font-size:18px; font-weight:500;}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header glass">
  <div class="header-left back-btn-container">
    <button onclick="goHome()" class="back-btn"><i class="fas fa-arrow-left"></i></button>
    <div class="logo">Subuluke</div>
  </div>
  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">
      <i id="themeIcon" class="fas fa-moon"></i>
    </div>
  </div>
</header>

<!-- CART -->
<div class="cart-page">
  <div id="cartItems" class="cart-items"></div>

  <div id="emptyCart" class="empty-cart">
    <p>Your cart is empty</p>
  </div>

  <div class="cart-summary glass">
    <h2>Total: <span id="cartTotal">0</span></h2>
    <button onclick="goCheckout()" class="checkout-btn">Proceed to Checkout</button>
  </div>
</div>

<script>
/* THEME LOGIC */
function toggleTheme(){
  document.body.classList.toggle("dark");
  const isDark=document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark?"dark":"light");
  updateThemeIcon();
}
function updateThemeIcon(){
  const icon=document.getElementById("themeIcon");
  icon.className=document.body.classList.contains("dark")?"fas fa-sun":"fas fa-moon";
}
if(localStorage.getItem("theme")==="dark"){document.body.classList.add("dark");}
updateThemeIcon();

function formatPrice(amount){ return Number(amount).toLocaleString("en-NG"); }

/* CART LOGIC */
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartItems=document.getElementById("cartItems");
const cartTotal=document.getElementById("cartTotal");
const emptyCart=document.getElementById("emptyCart");

function renderCart(){
  cartItems.innerHTML="";
  if(cart.length===0){ emptyCart.style.display="block"; cartTotal.innerText="₦0"; return; }
  emptyCart.style.display="none";
  let total=0;
  cart.forEach(item=>{
    total+=item.price*item.qty;
    const div=document.createElement("div");
    div.className="cart-item glass";
    div.innerHTML=`
      <img src="${item.image}">
      <div class="cart-details">
        <div class="cart-name">${item.name}</div>
        <div class="cart-price">₦${formatPrice(item.price)}</div>
      </div>
      <div class="cart-qty">
        <button onclick="decreaseQty('${item._id}')"><i class="fas fa-minus"></i></button>
        <span>${item.qty}</span>
        <button onclick="increaseQty('${item._id}')"><i class="fas fa-plus"></i></button>
      </div>
    `;
    cartItems.appendChild(div);
  });
  cartTotal.innerText=`₦${formatPrice(total)}`;
}

function increaseQty(id){
  const item=cart.find(i=>i._id===id);
  if(item){ item.qty++; saveCart(); }
}
function decreaseQty(id){
  const item=cart.find(i=>i._id===id);
  if(item){ item.qty--; if(item.qty<=0) cart=cart.filter(i=>i._id!==id); saveCart(); }
}
function saveCart(){ localStorage.setItem("cart",JSON.stringify(cart)); renderCart(); }

/* NAVIGATION */
function goHome(){ window.location.href="index.html"; }
function goCheckout(){ window.location.href="checkout.html"; }

/* INIT */
renderCart();
</script>

</body>
</html>
