<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Subuluke</title>

<style>

/* =========================
THEME VARIABLES
========================= */
:root {
  --bg-gradient: linear-gradient(to bottom, #FFF8E7 0%, #FFD77A 100%);
  --bg: #FFF8E7;
  --header-gradient: linear-gradient(135deg, #E6A520 0%, #FFD77A 100%);
  --card: rgba(255,248,231,0.65);
  --text: #3a2a00;
  --muted: #777;
  --border: rgba(255,255,255,0.25);
  --accent: #E6A520;
  --softGold: #FFD77A;
}

body.dark {
  --bg-gradient: linear-gradient(to bottom, #121212 0%, #1A1A1A 100%);
  --bg: #0F0F0F;
  --header-gradient: linear-gradient(135deg, #121212 0%, #1A1A1A 100%);
  --card: rgba(26,26,26,0.65);
  --text: #F5F5F5;
  --muted: #BBBBBB;
  --border: rgba(255,255,255,0.15);
}

/* =========================
BASE
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  background: var(--bg-gradient);
  color: var(--text);
}

/* =========================
HEADER
========================= */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;

  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;

  background: var(--header-gradient);
  border-bottom: 1px solid rgba(255,255,255,0.18);
  border-radius: 0 0 14px 14px;

  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
}

.header-right{
  display:flex;
  align-items:center;
}

.back-btn{
  background: transparent;
  border:1px solid var(--border);
  width:36px;
  height:36px;
  border-radius:8px;
  cursor:pointer;
  color:var(--text);
}

.back-btn:hover{
  background: var(--accent);
  color:#000;
}

/* -------------------------
Header Icons
------------------------- */
:root { --icon-color: #3a2a00; }      /* light mode */
body.dark { --icon-color: var(--softGold); } /* dark mode */

/* ICON COLOR CONTROL */
.header svg,
.footer svg,
.icon {
  color: var(--icon-color);
}

/* =========================
CART PAGE
========================= */
.cart-page{
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.cart-items{
  display:flex;
  flex-direction: column;
  gap:15px;
}

/* ITEM */
.cart-item{
  display:flex;
  gap:15px;
  align-items:center;
  background: var(--card);
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
}

.cart-item img{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:8px;
}

.cart-details{
  flex:1;
}

.cart-name{
  font-weight:600;
}

.cart-price{
  color: var(--accent);
}

/* QTY */
.cart-qty{
  display:flex;
  align-items:center;
  gap:10px;
}

.cart-qty button{
  width:30px;
  height:30px;
  border:none;
  border-radius:6px;
  background: var(--accent);
  color:#000;
  cursor:pointer;
}

/* SUMMARY */
.cart-summary{
  margin-top: 30px;
  text-align:center;
}

.checkout-btn{
  margin-top:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background: var(--accent);
  color:#000;
  font-weight:600;
  cursor:pointer;
}

/* EMPTY */
.empty-cart{
  text-align:center;
  margin-top:40px;
  color:var(--muted);
  display:none;
}

/* =========================
THEME TOGGLE
========================= */
.theme-toggle{
  cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button onclick="goHome()" class="back-btn">←</button>
    <div class="logo">Subuluke</div>
  </div>

  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">

      <svg id="moonIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>

        <!-- Sun Icon -->
  <svg id="sunIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>
    </div>
  </div>
</header>

<!-- CART -->
<div class="cart-page">

  <div id="cartItems" class="cart-items"></div>

  <div id="emptyCart" class="empty-cart">
    <p>Your cart is empty</p>
  </div>

  <div class="cart-summary">
    <h2>Total: ₦<span id="cartTotal">0</span></h2>
    <button onclick="goCheckout()" class="checkout-btn">Proceed to Checkout</button>
  </div>

</div>

<script>

/* =========================
THEME
========================= */
function toggleTheme(){
  document.body.classList.toggle("dark")
  const isDark = document.body.classList.contains("dark")
  localStorage.setItem("theme", isDark ? "dark" : "light")
  updateThemeIcon()
}

function updateThemeIcon(){
  const moon = document.getElementById("moonIcon")
  const sun = document.getElementById("sunIcon")

  if(document.body.classList.contains("dark")){
    moon.style.display = "none"
    sun.style.display = "block"
  }else{
    moon.style.display = "block"
    sun.style.display = "none"
  }
}

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark")
}
updateThemeIcon()


// ===== PRICE FORMAT ====
function formatPrice(amount){
  return Number(amount).toLocaleString("en-NG")
}


/* =========================
CART LOGIC
========================= */
let cart = JSON.parse(localStorage.getItem("cart")) || []

const cartItems = document.getElementById("cartItems")
const cartTotal = document.getElementById("cartTotal")
const emptyCart = document.getElementById("emptyCart")

function renderCart(){
  cartItems.innerHTML = ""

  if(cart.length === 0){
    emptyCart.style.display = "block"
    return
  }else{
    emptyCart.style.display = "none"
  }

  let total = 0

  cart.forEach(item=>{
    total += item.price * item.qty

    const div = document.createElement("div")
    div.className = "cart-item"

    div.innerHTML = `
      <img src="${item.image}">
      <div class="cart-details">
        <div class="cart-name">${item.name}</div>
        <div class="cart-price">₦${formatPrice(item.price)}</div>
      </div>

      <div class="cart-qty">
        <button onclick="decreaseQty('${item._id}')">-</button>
        <span>${item.qty}</span>
        <button onclick="increaseQty('${item._id}')">+</button>
      </div>
    `

    cartItems.appendChild(div)
  })

  cartTotal.innerText = `₦${formatPrice(total)}`
}

function increaseQty(id){
  const item = cart.find(i=>i._id === id)
  if(item){
    item.qty++
    saveCart()
  }
}

function decreaseQty(id){
  const item = cart.find(i=>i._id === id)

  if(item){
    item.qty--

    if(item.qty <= 0){
      cart = cart.filter(i=>i._id !== id)
    }

    saveCart()
  }
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart))
  renderCart()
}

/* =========================
NAVIGATION
========================= */
function goHome(){
  window.location.href = "index.html"
}

function goCheckout(){
  window.location.href = "checkout.html"
}

/* INIT */
renderCart()

</script>

</body>
</html>
