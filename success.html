<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Confirmed | Subuluke</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* =========================
THEME
========================= */

:root{
--bg:#FFF8E7;
--text:#333;
--accent:#E6A520;
--softGold:#FFD77A;
--card:rgba(255,255,255,0.35);
--border:rgba(255,255,255,0.35);
--shadow:0 10px 30px rgba(0,0,0,0.15);
--muted:#777;
}

body.dark{
--bg:#0F0F0F;
--text:#F5F5F5;
--card:rgba(20,20,20,0.65);
--border:rgba(255,255,255,0.1);
--shadow:0 10px 30px rgba(0,0,0,0.45);
--muted:#aaa;
}

/* =========================
BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Poppins",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.5;
min-height:100vh;
}

/* =========================
HEADER
========================= */

.header{
position:sticky;
top:0;
width:100%;
z-index:1000;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-bottom:1px solid rgba(255,255,255,0.2);

padding:10px 20px;

display:flex;
justify-content:center;
}

body.dark .header{
background:rgba(20,20,20,0.7);
border-bottom:1px solid rgba(255,255,255,0.06);
}

.header-inner{
max-width:1200px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
}

/* =========================
LOGO
========================= */

.logo{
font-weight:700;
font-size:20px;
letter-spacing:1px;
color:var(--text);
}

body.dark .logo{
color:var(--softGold);
}

/* =========================
HEADER ICONS
========================= */

.header-icons{
display:flex;
gap:18px;
align-items:center;
}

.icon{
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:var(--text);
transition:.25s;
}

.icon:hover{
transform:scale(1.12);
}

body.dark .icon{
color:var(--softGold);
}

/* =========================
CONTAINER
========================= */

.container{
max-width:720px;
margin:auto;
padding:30px 20px;
}

/* =========================
SUCCESS HERO
========================= */

.success-hero{
text-align:center;
margin-top:20px;
}

.success-circle{
width:90px;
height:90px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
color:white;
margin:auto;
box-shadow:0 10px 40px rgba(37,211,102,0.5);
animation:pop .4s ease;
}

@keyframes pop{
0%{transform:scale(.6);opacity:0}
100%{transform:scale(1);opacity:1}
}

.order-id{
margin-top:12px;
font-weight:600;
background:var(--card);
padding:8px 14px;
border-radius:8px;
display:inline-block;
}

/* =========================
CARD
========================= */

.card{
background:var(--card);
backdrop-filter:blur(14px);
border-radius:16px;
padding:20px;
margin-top:20px;
border:1px solid var(--border);
box-shadow:var(--shadow);
}

/* =========================
ORDER ITEMS
========================= */

.order-item{
display:flex;
align-items:center;
gap:12px;
padding:12px 0;
border-bottom:1px solid rgba(0,0,0,0.08);
}

body.dark .order-item{
border-bottom:1px solid rgba(255,255,255,0.08);
}

.item-img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.item-info{
flex:1;
}

.item-name{
font-weight:600;
}

.item-meta{
font-size:13px;
color:var(--muted);
}

.item-total{
font-weight:700;
}

/* =========================
TOTAL
========================= */

.total-box{
margin-top:10px;
font-size:18px;
font-weight:700;
color:var(--accent);
}

/* =========================
BUTTONS
========================= */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

.whatsapp{
background:#25D366;
color:white;
}

.home{
background:var(--accent);
color:white;
}

.warning{
margin-top:15px;
background:#fff3cd;
color:#856404;
padding:10px;
border-radius:8px;
}

body.dark .warning{
background:#332701;
color:#FFD77A;
}

</style>
</head>

<body>

<header class="header">

<div class="header-inner">

<button onclick="goHome()" class="icon">
<i class="fas fa-arrow-left"></i>
</button>

<div class="logo">Subuluke</div>

<div class="header-icons">

<button class="icon" onclick="toggleTheme()">
<i class="fas fa-moon" id="moonIcon"></i>
<i class="fas fa-sun" id="sunIcon" style="display:none"></i>
</button>

</div>

</div>

</header>

<div class="container">

<div class="success-hero">

<div class="success-circle">
<i class="fas fa-check"></i>
</div>

<h1>Order Confirmed</h1>
<p>Thank you for your patronage 🙏</p>

<div id="orderId" class="order-id"></div>

</div>

<div class="card">

<h3>Order Details</h3>

<div id="items"></div>

<div id="total" class="total-box"></div>

<hr style="margin:16px 0">

<h3>Delivery Info</h3>

<p id="delivery"></p>

</div>

<div class="warning">
⚠️ Please send your order to WhatsApp to ensure it is processed.
</div>

<button class="btn whatsapp" onclick="sendWhatsApp()">
<i class="fab fa-whatsapp"></i> Send Order to WhatsApp
</button>

<button class="btn home" onclick="goHome()">
Back to Home
</button>

</div>

<script>

function toggleTheme(){
document.body.classList.toggle("dark")

const isDark=document.body.classList.contains("dark")

localStorage.setItem("theme",isDark?"dark":"light")

updateThemeIcon()
}

function updateThemeIcon(){

const moon=document.getElementById("moonIcon")
const sun=document.getElementById("sunIcon")

if(!moon || !sun) return

if(document.body.classList.contains("dark")){
moon.style.display="none"
sun.style.display="inline-block"
}else{
moon.style.display="inline-block"
sun.style.display="none"
}
}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark")
}

updateThemeIcon()

let order=null

function getOrderId(){
const params=new URLSearchParams(window.location.search)
return params.get("orderId")
}

async function fetchOrder(){

const orderId=getOrderId()

if(!orderId){
alert("Invalid order")
window.location.href="index.html"
return
}

try{

const res=await fetch(`https://subuluke.onrender.com/api/orders/${orderId}`)

const data=await res.json()

order=data.order

renderOrder()

localStorage.removeItem("cart")

}catch(err){

alert("Error loading order")

window.location.href="index.html"

}

}

function formatPrice(amount){
return Number(amount).toLocaleString("en-NG")
}

function renderOrder(){

document.getElementById("orderId").innerText="Order ID: "+order.orderId

let html=""

order.items.forEach(item=>{

const subtotal=item.price*item.qty

html+=`
<div class="order-item">
<img src="${item.image}" class="item-img">

<div class="item-info">
<div class="item-name">${item.name}</div>
<div class="item-meta">
Qty: ${item.qty} • ₦${formatPrice(item.price)}
</div>
</div>

<div class="item-total">
₦${formatPrice(subtotal)}
</div>
</div>
`

})

document.getElementById("items").innerHTML=html

document.getElementById("total").innerText="Total: ₦"+formatPrice(order.amount)

document.getElementById("delivery").innerHTML=`
Name: ${order.customer.name}<br>
Phone: ${order.customer.phone}<br>
Address: ${order.customer.address}
`

}

function sendWhatsApp(){

let msg=`🛒 *NEW ORDER — SUBULUKE*\n\n`

msg+=`Order ID: ${order.orderId}\n\n`

order.items.forEach(i=>{
msg+=`${i.qty}x ${i.name} — ₦${formatPrice(i.price*i.qty)}\n`
})

msg+=`\nTotal: ₦${formatPrice(order.amount)}\n\n`

msg+=`Customer:\n${order.customer.name}\n${order.customer.phone}\n${order.customer.address}`

const url=`https://wa.me/2349122054068?text=${encodeURIComponent(msg)}`

window.open(url,"_blank")

localStorage.setItem("whatsapp_sent","true")

}

function goHome(){

if(localStorage.getItem("whatsapp_sent")!=="true"){
alert("Please send order to WhatsApp first")
return
}

localStorage.removeItem("whatsapp_sent")

window.location.href="index.html"

}

window.onload=fetchOrder

</script>

</body>
</html>
