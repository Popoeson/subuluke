<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Confirmed | Subuluke</title>

<style>

/* ========================= THEME ========================= */  
:root {  
  --bg-gradient: linear-gradient(to bottom, #F7E7CE 0%, #FFD77A 100%);  
  --bg: #FFF8E7;  
  --header-gradient: linear-gradient(135deg, #E6A520 0%, #FFD77A 100%);  
  --card: rgba(255,248,231,0.65);  
  --text: #3a2a00;  
  --muted: #777;  
  --border: rgba(255,255,255,0.25);  
  --accent: #E6A520;  
}  

body.dark {  
  --bg-gradient: linear-gradient(to bottom, #121212 0%, #1A1A1A 100%);  
  --bg: #0F0F0F;  
  --header-gradient: linear-gradient(135deg, #121212 0%, #1A1A1A 100%);  
  --card: rgba(26,26,26,0.65);  
  --text: #F5F5F5;  
  --muted: #BBBBBB;  
  --border: rgba(255,255,255,0.15);  
}  

/* ========================= BASE ========================= */  
*{margin:0;padding:0;box-sizing:border-box;}  

html, body {
  height: 100%;
}

body{
  font-family: system-ui;
  color: var(--text);

  /* FULL PAGE GRADIENT FIX */
  background: var(--bg-gradient);
  background-repeat: no-repeat;
  background-attachment: fixed; /* 🔥 important */
  background-size: cover;

  min-height: 100vh;
}

/* =========================
HEADER
========================= */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;

  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;

  background: var(--header-gradient);
  border-bottom: 1px solid rgba(255,255,255,0.18);
  border-radius: 0 0 14px 14px;

  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
}

.header-right{
  display:flex;
  align-items:center;
}

.back-btn{
  background: transparent;
  border:1px solid var(--border);
  width:36px;
  height:36px;
  border-radius:8px;
  cursor:pointer;
  color:var(--text);
}

.back-btn:hover{
  background: var(--accent);
  color:#000;
}

/* ================= CONTAINER ================= */
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  backdrop-filter: blur(10px);
  border-radius:16px;
  padding:25px;
  margin-top:20px;
}

/* ================= SUCCESS ================= */
.success{
  text-align:center;
}

.success-icon{
  font-size:60px;
  color:green;
}

h1{
  margin-top:10px;
}

.note{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
}

/* ================= ORDER ================= */
.item{
  margin-bottom:15px;
  border-bottom:1px solid #ddd;
  padding-bottom:10px;
}

/* ================= BUTTONS ================= */
.btn{
  display:block;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

.whatsapp{
  background:#25D366;
  color:white;
}

.home{
  background:var(--accent);
  color:white;
}

/* ================= WARNING ================= */
.warning{
  margin-top:15px;
  background:#fff3cd;
  color:#856404;
  padding:10px;
  border-radius:8px;
  font-size:14px;
}

body.dark .warning{
  background:#332701;
  color:#FFD77A;
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button onclick="goBack()" class="back-btn">←</button>
    <div class="logo">Subuluke</div>
  </div>

  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">

      <svg id="moonIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>

        <!-- Sun Icon -->
  <svg id="sunIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>

    </div>
  </div>

</header>

  <!-- SUCCESS -->
  <div class="card success">
    <div class="success-icon">✔</div>
    <h1>Order Confirmed</h1>
    <p>Thank you for your patronage 🙏</p>
    <p id="orderId"></p>
  </div>

  <!-- ORDER DETAILS -->
  <div class="card">
    <h3>Order Details</h3>
    <div id="items"></div>

    <h4 id="total"></h4>

    <hr>

    <h3>Delivery Info</h3>
    <p id="delivery"></p>
  </div>

  <!-- WARNING -->
  <div class="warning">
    ⚠️ Please send your order to WhatsApp to ensure it is processed.
  </div>

  <!-- BUTTONS -->
  <button class="btn whatsapp" onclick="sendWhatsApp()">Send Order to WhatsApp</button>
  <button class="btn home" onclick="goHome()">Back to Home</button>

</div>

<script>

/* ========================= THEME ========================= */
function toggleTheme(){
  document.body.classList.toggle("dark")
  const isDark = document.body.classList.contains("dark")
  localStorage.setItem("theme", isDark ? "dark" : "light")
  updateThemeIcon()
}

function updateThemeIcon(){
  const moon = document.getElementById("moonIcon")
  const sun = document.getElementById("sunIcon")

  if(document.body.classList.contains("dark")){
    moon.style.display = "none"
    sun.style.display = "block"
  }else{
    moon.style.display = "block"
    sun.style.display = "none"
  }
}

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark")
}
updateThemeIcon()

/* ================= GLOBAL ORDER ================= */
let order = null

/* ================= GET ORDER ID FROM URL ================= */
function getOrderId(){
  const params = new URLSearchParams(window.location.search)
  return params.get("orderId")
}

/* ================= FETCH ORDER ================= */
async function fetchOrder(){

  const orderId = getOrderId()

  if(!orderId){
    alert("Invalid order access")
    window.location.href = "index.html"
    return
  }

  try{

    const res = await fetch(`https://subuluke.onrender.com/api/orders/${orderId}`)
    const data = await res.json()

    if(data.status !== "success"){
      throw new Error("Order not found")
    }

    order = data.order

    renderOrder()

  }catch(err){
    console.error(err)
    alert("Could not load order")
    window.location.href = "index.html"
  }
}

/* ================= RENDER ORDER ================= */
function renderOrder(){

  document.getElementById("orderId").innerText = "Order ID: " + order.orderId

  let itemsHTML = ""
  order.items.forEach(item=>{
    itemsHTML += `
      <div class="item">
        <strong>${item.name}</strong><br>
        Qty: ${item.qty}<br>
        Price: ₦${item.price}<br>
      </div>
    `
  })

  document.getElementById("items").innerHTML = itemsHTML

  document.getElementById("total").innerText = "Total: ₦" + order.amount

  document.getElementById("delivery").innerHTML = `
    Name: ${order.customer.name}<br>
    Phone: ${order.customer.phone}<br>
    Address: ${order.customer.address}
  `
}

/* ================= WHATSAPP ================= */
function sendWhatsApp(){

  if(!order) return

  let message = `🛒 NEW ORDER - SUBULUKE\n\n`
  message += `Order ID: ${order.orderId}\n\n`

  message += `👤 Customer Details:\n`
  message += `Name: ${order.customer.name}\n`
  message += `Phone: ${order.customer.phone}\n`
  message += `Address: ${order.customer.address}\n\n`

  message += `🛍 Order Items:\n\n`

  order.items.forEach((item,index)=>{
    message += `${index+1}. ${item.name}\n`
    message += `Qty: ${item.qty}\n`
    message += `Price: ₦${item.price}\n`
    message += `Image: ${item.image}\n\n`
  })

  message += `💰 Total: ₦${order.amount}\n`
  message += `✅ Payment Status: Paid`

  const encoded = encodeURIComponent(message)

  const phone = "2349122054068"

  window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank")

  localStorage.setItem("whatsapp_sent", "true")
}

/* ================= BLOCK EXIT ================= */
window.addEventListener("beforeunload", function (e) {
  if(localStorage.getItem("whatsapp_sent") !== "true"){
    e.preventDefault()
    e.returnValue = ""
  }
})

/* ================= BACK BUTTON ================= */
function goHome(){

  if(localStorage.getItem("whatsapp_sent") !== "true"){
    alert("Please send your order to WhatsApp before leaving.")
    return
  }

  localStorage.removeItem("whatsapp_sent")

  window.location.href = "index.html"
}

/* ================= INIT ================= */
window.onload = () => {
  fetchOrder()
}

</script>

</body>
</html>
