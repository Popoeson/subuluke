<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Confirmed | Subuluke</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ========================= THEME ========================= */

:root{
--bg:#FFF8E7;
--text:#3a2a00;
--accent:#E6A520;
--softGold:#FFD77A;
--card:rgba(255,255,255,0.45);
--border:rgba(255,255,255,0.35);
--shadow:0 10px 30px rgba(0,0,0,0.15);
--muted:#777;
}

body.dark{
--bg:#0F0F0F;
--text:#F5F5F5;
--card:rgba(20,20,20,0.7);
--border:rgba(255,255,255,0.08);
--shadow:0 10px 30px rgba(0,0,0,0.5);
--muted:#aaa;
}

/* ================= BASE ================= */

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Poppins",system-ui;
background:linear-gradient(to bottom,#F7E7CE,#FFD77A);
background-attachment:fixed;
min-height:100vh;
color:var(--text);
}

body.dark{
background:linear-gradient(to bottom,#121212,#1A1A1A);
}

/* ================= HEADER ================= */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 20px;
}

.logo{
font-weight:700;
font-size:20px;
}

.back-btn{
border:none;
background:var(--card);
backdrop-filter:blur(10px);
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

/* ================= CONTAINER ================= */

.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* ================= SUCCESS HERO ================= */

.success-hero{
text-align:center;
margin-top:20px;
}

.success-circle{
width:90px;
height:90px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
color:white;
margin:auto;
box-shadow:0 10px 40px rgba(37,211,102,0.5);
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

.order-id{
margin-top:12px;
font-weight:600;
background:var(--card);
display:inline-block;
padding:8px 14px;
border-radius:8px;
}

/* ================= CARD ================= */

.card{
background:var(--card);
backdrop-filter:blur(12px);
border-radius:16px;
padding:20px;
margin-top:20px;
border:1px solid var(--border);
box-shadow:var(--shadow);
}

/* ================= ORDER ITEMS ================= */

.order-item{
display:flex;
align-items:center;
gap:12px;
padding:12px 0;
border-bottom:1px solid rgba(0,0,0,0.08);
}

body.dark .order-item{
border-bottom:1px solid rgba(255,255,255,0.08);
}

.item-img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.item-info{
flex:1;
}

.item-name{
font-weight:600;
}

.item-meta{
font-size:13px;
color:var(--muted);
}

.item-total{
font-weight:700;
}

/* ================= TOTAL ================= */

.total-box{
margin-top:10px;
font-size:18px;
font-weight:700;
color:var(--accent);
}

/* ================= BUTTONS ================= */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
font-weight:600;
cursor:pointer;
}

.whatsapp{
background:#25D366;
color:white;
}

.home{
background:var(--accent);
color:white;
}

.warning{
margin-top:15px;
background:#fff3cd;
color:#856404;
padding:10px;
border-radius:8px;
}

body.dark .warning{
background:#332701;
color:#FFD77A;
}

</style>
</head>

<body>

<header class="header">
<button onclick="goHome()" class="back-btn">
<i class="fas fa-arrow-left"></i>
</button>
<div class="logo">Subuluke</div>
</header>

<div class="container">

<div class="success-hero">

<div class="success-circle">
<i class="fas fa-check"></i>
</div>

<h1>Order Confirmed</h1>
<p>Thank you for your patronage 🙏</p>

<div id="orderId" class="order-id"></div>

</div>

<div class="card">

<h3>Order Details</h3>

<div id="items"></div>

<div id="total" class="total-box"></div>

<hr style="margin:16px 0">

<h3>Delivery Info</h3>

<p id="delivery"></p>

</div>

<div class="warning">
⚠️ Please send your order to WhatsApp to ensure it is processed.
</div>

<button class="btn whatsapp" onclick="sendWhatsApp()">
<i class="fab fa-whatsapp"></i> Send Order to WhatsApp
</button>

<button class="btn home" onclick="goHome()">
Back to Home
</button>

</div>

<script>

let order=null

function getOrderId(){
const params=new URLSearchParams(window.location.search)
return params.get("orderId")
}

async function fetchOrder(){

const orderId=getOrderId()

if(!orderId){
alert("Invalid order")
window.location.href="index.html"
return
}

try{

const res=await fetch(`https://subuluke.onrender.com/api/orders/${orderId}`)

const data=await res.json()

order=data.order

renderOrder()

localStorage.removeItem("cart")

}catch(err){

alert("Error loading order")

window.location.href="index.html"

}

}

function formatPrice(amount){
return Number(amount).toLocaleString("en-NG")
}

function renderOrder(){

document.getElementById("orderId").innerText="Order ID: "+order.orderId

let html=""

order.items.forEach(item=>{

const subtotal=item.price*item.qty

html+=`
<div class="order-item">
<img src="${item.image}" class="item-img">

<div class="item-info">
<div class="item-name">${item.name}</div>
<div class="item-meta">
Qty: ${item.qty} • ₦${formatPrice(item.price)}
</div>
</div>

<div class="item-total">
₦${formatPrice(subtotal)}
</div>
</div>
`

})

document.getElementById("items").innerHTML=html

document.getElementById("total").innerText="Total: ₦"+formatPrice(order.amount)

document.getElementById("delivery").innerHTML=`
Name: ${order.customer.name}<br>
Phone: ${order.customer.phone}<br>
Address: ${order.customer.address}
`

}

function sendWhatsApp(){

let msg=`🛒 *NEW ORDER — SUBULUKE*\n\n`

msg+=`Order ID: ${order.orderId}\n\n`

order.items.forEach(i=>{
msg+=`${i.qty}x ${i.name} — ₦${formatPrice(i.price*i.qty)}\n`
})

msg+=`\nTotal: ₦${formatPrice(order.amount)}\n\n`

msg+=`Customer:\n${order.customer.name}\n${order.customer.phone}\n${order.customer.address}`

const url=`https://wa.me/2349122054068?text=${encodeURIComponent(msg)}`

window.open(url,"_blank")

localStorage.setItem("whatsapp_sent","true")

}

function goHome(){

if(localStorage.getItem("whatsapp_sent")!=="true"){
alert("Please send order to WhatsApp first")
return
}

localStorage.removeItem("whatsapp_sent")

window.location.href="index.html"

}

window.onload=fetchOrder

</script>

</body>
</html>
