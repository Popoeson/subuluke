<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Confirmed | Subuluke</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* =========================
THEME
========================= */
:root{
--bg:#FFF8E7;
--text:#333;
--accent:#E6A520;
--softGold:#FFD77A;
--card:rgba(255,255,255,0.45);
--border:rgba(255,255,255,0.35);
--shadow:0 10px 30px rgba(0,0,0,0.15);
--muted:#777;
}

body.dark{
--bg:#0F0F0F;
--text:#F5F5F5;
--card:rgba(20,20,20,0.7);
--border:rgba(255,255,255,0.08);
--shadow:0 10px 30px rgba(0,0,0,0.5);
--muted:#aaa;
}

/* =========================
BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Poppins",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.5;
}

/* =========================
HEADER
========================= */

.header{
position:sticky;
top:0;
width:100%;
z-index:1000;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-bottom:1px solid rgba(255,255,255,0.2);

padding:10px 20px;

display:flex;
justify-content:center;
}

body.dark .header{
background:rgba(20,20,20,0.7);
border-bottom:1px solid rgba(255,255,255,0.06);
}

.header-inner{
max-width:1200px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:700;
font-size:20px;
letter-spacing:1px;
}

.icon{
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:var(--text);
}

/* =========================
CONTAINER
========================= */

.container{
max-width:700px;
margin:auto;
padding:30px 20px;
}

/* =========================
SUCCESS HERO
========================= */

.success-hero{
text-align:center;
margin-bottom:20px;
}

.success-circle{
width:90px;
height:90px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:white;
margin:auto;
box-shadow:0 10px 40px rgba(37,211,102,0.4);
animation:pop .5s ease;
}

@keyframes pop{
0%{transform:scale(.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

.order-id{
margin-top:10px;
font-weight:600;
background:var(--card);
display:inline-block;
padding:8px 14px;
border-radius:8px;
}

/* =========================
STATUS
========================= */

.status{
margin-top:15px;
font-size:14px;
color:var(--muted);
}

.status span{
display:block;
margin-top:4px;
}

/* =========================
CARD
========================= */

.card{
background:var(--card);
backdrop-filter:blur(12px);
border-radius:16px;
padding:20px;
margin-top:20px;
border:1px solid var(--border);
box-shadow:var(--shadow);
}

/* =========================
ORDER ITEMS
========================= */

.order-item{
display:flex;
align-items:center;
gap:12px;
padding:12px 0;
border-bottom:1px solid rgba(0,0,0,0.08);
}

body.dark .order-item{
border-bottom:1px solid rgba(255,255,255,0.08);
}

.item-img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.item-info{
flex:1;
}

.item-name{
font-weight:600;
}

.item-meta{
font-size:13px;
color:var(--muted);
}

.item-total{
font-weight:700;
}

/* =========================
PRICE SUMMARY
========================= */

.summary{
margin-top:12px;
font-size:14px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin-top:6px;
}

.summary-total{
font-weight:700;
font-size:18px;
color:var(--accent);
margin-top:8px;
}

/* =========================
BUTTONS
========================= */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
font-weight:600;
cursor:pointer;
}

.whatsapp{
background:#25D366;
color:white;
}

.home{
background:var(--accent);
color:white;
}

.btn:disabled{
opacity:.6;
cursor:not-allowed;
}

/* =========================
WARNING
========================= */

.warning{
margin-top:15px;
background:#fff3cd;
color:#856404;
padding:10px;
border-radius:8px;
}

body.dark .warning{
background:#332701;
color:#FFD77A;
}

/* =========================
MODAL
========================= */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal-content{
background:var(--card);
backdrop-filter:blur(10px);
padding:25px;
border-radius:12px;
max-width:320px;
text-align:center;
box-shadow:var(--shadow);
}

.modal-content button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:var(--accent);
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<header class="header">
<div class="header-inner">

<div class="logo">Subuluke</div>

<button class="icon" onclick="toggleTheme()">
<i class="fas fa-moon" id="moonIcon"></i>
<i class="fas fa-sun" id="sunIcon" style="display:none"></i>
</button>

</div>
</header>


<div class="container">

<div class="success-hero">

<div class="success-circle">
<i class="fas fa-check"></i>
</div>

<h1>Payment Successful</h1>

<p>Thank you for your patronage 🙏</p>

<div id="orderId" class="order-id"></div>

<div class="status">
<span>✓ Payment confirmed</span>
<span id="whatsappStatus">⚠ Awaiting WhatsApp confirmation</span>
</div>

</div>


<div class="card">

<h3>Order Details</h3>

<div id="items"></div>

<div class="summary">

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal"></span>
</div>

<div class="summary-row">
<span>Delivery</span>
<span>₦1,500</span>
</div>

<div class="summary-row summary-total">
<span>Total</span>
<span id="total"></span>
</div>

</div>

<hr style="margin:16px 0">

<h3>Delivery Info</h3>

<p id="delivery"></p>

</div>

<div class="warning">
⚠ Please send your order to WhatsApp so it can be processed.
</div>

<button id="whatsappBtn" class="btn whatsapp" onclick="sendWhatsApp()">
<i class="fab fa-whatsapp"></i> Send Order to WhatsApp
</button>

<button class="btn home" onclick="goHome()">
Back to Home
</button>

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <p id="modalText"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>

/* ================= THEME ================= */

function toggleTheme(){
document.body.classList.toggle("dark")

const isDark=document.body.classList.contains("dark")

localStorage.setItem("theme",isDark?"dark":"light")

updateThemeIcon()
}

function updateThemeIcon(){

const moon=document.getElementById("moonIcon")
const sun=document.getElementById("sunIcon")

if(!moon||!sun)return

if(document.body.classList.contains("dark")){
moon.style.display="none"
sun.style.display="inline-block"
}else{
moon.style.display="inline-block"
sun.style.display="none"
}

}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark")
}

updateThemeIcon()


/* ================= GLOBAL ORDER ================= */

let order=null


/* ================= GET ORDER ID ================= */

function getOrderId(){
const params=new URLSearchParams(window.location.search)
return params.get("orderId")
}


/* ================= FETCH ORDER ================= */

async function fetchOrder(){

const orderId=getOrderId()

if(!orderId){
showModal("Invalid order")
window.location.href="index.html"
return
}

try{

const res=await fetch(`https://subuluke.onrender.com/api/orders/${orderId}`)

const data=await res.json()

order=data.order

renderOrder()

localStorage.removeItem("cart")

}catch(err){

console.error(err)

showModal("Error loading order")

window.location.href="index.html"

}

}


/* ================= PRICE FORMAT ================= */

function formatPrice(amount){
return Number(amount).toLocaleString("en-NG")
}


/* ================= RENDER ORDER ================= */

function renderOrder(){

document.getElementById("orderId").innerText="Order ID: "+order.orderId

let html=""
let subtotal=0

order.items.forEach(item=>{

const total=item.price*item.qty
subtotal+=total

html+=`
<div class="order-item">
<img src="${item.image}" class="item-img">

<div class="item-info">
<div class="item-name">${item.name}</div>
<div class="item-meta">
Qty: ${item.qty} • ₦${formatPrice(item.price)}
</div>
</div>

<div class="item-total">
₦${formatPrice(total)}
</div>
</div>
`

})

document.getElementById("items").innerHTML=html

document.getElementById("subtotal").innerText="₦"+formatPrice(subtotal)

document.getElementById("total").innerText="₦"+formatPrice(order.amount)

document.getElementById("delivery").innerHTML=`
Name: ${order.customer.name}<br>
Phone: ${order.customer.phone}<br>
Address: ${order.customer.address}
`

}


/* ================= WHATSAPP ================= */

function sendWhatsApp(){

let msg=`🛒 *NEW ORDER — SUBULUKE*\n\n`

msg+=`Order ID: ${order.orderId}\n\n`

order.items.forEach(i=>{

msg+=`${i.qty}x ${i.name} — ₦${formatPrice(i.price*i.qty)}\n`

if(i.image){
msg+=`Image: ${i.image}\n`
}

msg+=`\n`

})

msg+=`\nTotal: ₦${formatPrice(order.amount)}\n\n`

msg+=`Customer:\n${order.customer.name}\n${order.customer.phone}\n${order.customer.address}`

const url=`https://wa.me/2349122054068?text=${encodeURIComponent(msg)}`

window.open(url,"_blank")

localStorage.setItem("whatsapp_sent","true")

document.getElementById("whatsappBtn").innerHTML="✓ Order Sent to WhatsApp"

document.getElementById("whatsappBtn").disabled=true

document.getElementById("whatsappStatus").innerText="✓ Order sent to admin"

}

/* ========== SHOW MODAL ===========*/
function showModal(message){

const modal = document.getElementById("modal")
const text = document.getElementById("modalText")

text.innerText = message

modal.style.display = "flex"

}

function closeModal(){

document.getElementById("modal").style.display = "none"

}

/* ================= INIT ================= */

window.onload=fetchOrder

</script>

</body>
</html>
