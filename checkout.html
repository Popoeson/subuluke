<!DOCTYPE html> 
 <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Checkout - Subuluke</title> 
 <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>  
  /* =========================
THEME
========================= */

:root{
--bg:#FFF8E7;
--text:#333;
--accent:#E6A520;
--softGold:#FFD77A;

--card:rgba(255,255,255,0.35);
--border:rgba(255,255,255,0.35);
--shadow:0 8px 24px rgba(0,0,0,0.15);
}

body.dark{
--bg:#0F0F0F;
--text:#F5F5F5;

--card:rgba(20,20,20,0.55);
--border:rgba(255,255,255,0.1);
--shadow:0 8px 24px rgba(0,0,0,0.45);
}


/* =========================
BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Poppins",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.5;
min-height:100vh;
}


/* =========================
HEADER
========================= */

.header{
position:sticky;
top:0;
width:100%;
z-index:1000;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-bottom:1px solid rgba(255,255,255,0.2);

padding:10px 20px;

display:flex;
justify-content:space-between;
align-items:center;
}

body.dark .header{
background:rgba(20,20,20,0.7);
border-bottom:1px solid rgba(255,255,255,0.06);
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.header-right{
display:flex;
align-items:center;
}

.logo{
font-weight:700;
font-size:20px;
letter-spacing:1px;
color:var(--text);
}

body.dark .logo{
color:var(--softGold);
}


/* =========================
HEADER ICONS
========================= */

.icon{
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:var(--text);
transition:.25s;
}

.icon:hover{
transform:scale(1.12);
}

body.dark .icon{
color:var(--softGold);
}


/* =========================
BACK BUTTON
========================= */

.back-btn{
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:var(--text);
}

body.dark .back-btn{
color:var(--softGold);
}


/* =========================
PAGE CONTAINER
========================= */

.checkout{
max-width:720px;
margin:auto;
padding:30px 20px;
}


/* =========================
FORM CARD
========================= */

.form{

display:flex;
flex-direction:column;

gap:14px;

background:var(--card);

padding:20px;

border-radius:16px;

border:1px solid var(--border);

backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

box-shadow:var(--shadow);

}


/* =========================
FORM INPUTS
========================= */

.form input{

padding:12px 14px;

border-radius:10px;

border:1px solid var(--border);

background:rgba(255,255,255,0.4);

font-size:14px;

color:var(--text);

outline:none;

transition:.25s;

}

body.dark .form input{
background:rgba(20,20,20,0.5);
}

.form input:focus{

border:1px solid var(--accent);

box-shadow:0 0 0 2px rgba(230,165,32,0.15);

}


/* =========================
SUMMARY CARD
========================= */

.summary{

margin-top:22px;

background:var(--card);

padding:20px;

border-radius:16px;

border:1px solid var(--border);

backdrop-filter:blur(14px);

box-shadow:var(--shadow);

}


/* =========================
SUMMARY HEADER
========================= */

.summary-header{

display:flex;
justify-content:space-between;
align-items:center;

cursor:pointer;

font-weight:600;

margin-bottom:12px;

font-size:15px;

}


/* =========================
SUMMARY CONTENT
========================= */

.summary-content{
display:none;
}


/* =========================
ROW ITEMS
========================= */

.row{

display:flex;
justify-content:space-between;

margin:8px 0;

font-size:14px;

}


/* =========================
TOTAL
========================= */

.total{

font-weight:700;

font-size:18px;

color:var(--accent);

}


/* =========================
CART ITEM
========================= */

.cart-item{

display:flex;
gap:12px;

align-items:center;

padding:10px 0;

border-bottom:1px solid rgba(0,0,0,0.05);

}

body.dark .cart-item{
border-bottom:1px solid rgba(255,255,255,0.06);
}

.cart-item img{

width:52px;
height:52px;

border-radius:10px;

object-fit:cover;

}

.cart-details{
flex:1;
}

.cart-details p{
font-size:14px;
}

.cart-price{

font-weight:600;

font-size:14px;

color:var(--accent);

}


/* =========================
PAY BUTTON
========================= */

.pay-btn{

margin-top:24px;

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:var(--accent);

color:#fff;

font-weight:600;

font-size:15px;

cursor:pointer;

transition:.25s;

box-shadow:0 6px 16px rgba(230,165,32,0.35);

}

.pay-btn:hover{

background:var(--softGold);

color:#000;

transform:translateY(-2px);

}


/* =========================
LOADER
========================= */

.loader{

text-align:center;

margin-top:20px;

font-size:14px;

color:var(--accent);

display:none;

}


/* =========================
MOBILE
========================= */

@media(max-width:768px){

.checkout{
padding:20px 16px;
}

.logo{
font-size:18px;
}

.icon{
font-size:16px;
}

}

</style>

  </head> 
 <body> 

 <!-- HEADER --> 

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button onclick="goBack()" class="back-btn">←</button>
    <div class="logo">Subuluke</div>
  </div>

  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">

      <svg id="moonIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>

        <!-- Sun Icon -->
  <svg id="sunIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>

    </div>
  </div>

</header>

 <!-- PAGE --> 
 <div class="checkout">   

 <!-- FORM -->   

 <div class="form">  
    <input id="name" placeholder="Full Name">  
    <input id="email" placeholder="Email">  
    <input id="phone" placeholder="Phone Number">  
    <input id="address" placeholder="Delivery Address">  

  </div>   

 <!-- SUMMARY -->  
<div class="summary">

  <!-- COLLAPSIBLE HEADER -->
  <div class="summary-header" onclick="toggleSummary()">
    <span>Order Summary</span>
    <span id="toggleIcon">▼</span>
  </div>

  <!-- COLLAPSIBLE CONTENT -->
  <div id="summaryContent" class="summary-content">

    <!-- PRODUCTS LIST -->
    <div id="cartItems"></div>

    <hr style="margin:12px 0; opacity:0.2">

    <!-- TOTALS -->
    <div class="row">
      <span>Subtotal</span>
      <span><span id="subtotal">0</span></span>
    </div>

    <div class="row">
      <span>Delivery</span>
      <span>₦1500</span>
    </div>

    <div class="row total">
      <span>Total</span>
      <span><span id="total">0</span></span>
    </div>

  </div>

</div>

  </div>  <button class="pay-btn" onclick="pay()">Proceed to Payment</button>

  <div class="loader" id="loader">Checking payment...</div> 

 </div>  

<script>

/* ========================= THEME ========================= */
function toggleTheme(){
  document.body.classList.toggle("dark")
  const isDark = document.body.classList.contains("dark")
  localStorage.setItem("theme", isDark ? "dark" : "light")
  updateThemeIcon()
}

function updateThemeIcon(){
  const moon = document.getElementById("moonIcon")
  const sun = document.getElementById("sunIcon")

  if(document.body.classList.contains("dark")){
    moon.style.display = "none"
    sun.style.display = "block"
  }else{
    moon.style.display = "block"
    sun.style.display = "none"
  }
}

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark")
}
updateThemeIcon()

// ===== PRICE FORMAT ====
function formatPrice(amount){
  return Number(amount).toLocaleString("en-NG")
}


/* ========================= CART ========================= */
let cart = JSON.parse(localStorage.getItem("cart")) || []

let subtotal = cart.reduce((sum,i)=>sum + i.price * i.qty,0)
//let delivery = 1500
//let total = subtotal + delivery
let total = subtotal

document.getElementById("subtotal").innerText = `₦${formatPrice(subtotal)}`
document.getElementById("total").innerText = `₦${formatPrice(total)}`

/* ========================= RENDER CART ========================= */
function renderCart(){

  const container = document.getElementById("cartItems")
  if(!container) return

  container.innerHTML = ""

  cart.forEach(item => {

    const div = document.createElement("div")
    div.className = "cart-item"

    div.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <div class="cart-details">
        <p>${item.name}</p>
        <small>Qty: ${item.qty}</small>
      </div>
      <div class="cart-price">₦${formatPrice(item.price * item.qty)}</div>
    `

    container.appendChild(div)
  })
}

/* ========================= TOGGLE SUMMARY ========================= */
function toggleSummary(){

  const content = document.getElementById("summaryContent")
  const icon = document.getElementById("toggleIcon")

  if(!content) return

  if(content.style.display === "none" || content.style.display === ""){
    content.style.display = "block"
    icon.innerText = "▲"
  }else{
    content.style.display = "none"
    icon.innerText = "▼"
  }
}

/* ========================= PAYMENT ========================= */
async function pay(){

  const name = document.getElementById("name").value
  const email = document.getElementById("email").value
  const phone = document.getElementById("phone").value
  const address = document.getElementById("address").value

  if(!name || !email || !phone || !address){
    alert("Please fill all fields")
    return
  }

  if(cart.length === 0){
    alert("Cart is empty")
    return
  }

  document.getElementById("loader").style.display = "block"

  try{

    const res = await fetch("https://subuluke.onrender.com/api/paystack/initialize",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        email,
        amount: total * 100,
        metadata:{
          name,
          email,
          phone,
          address,
          items: cart
        }
      })
    })

    const data = await res.json()

    if(data.authorization_url){
      window.location.href = data.authorization_url
    }else{
      alert("Payment initialization failed")
    }

  }catch(err){
    console.error(err)
    alert("Something went wrong")
  }
}

/* ========================= VERIFY ========================= */
async function verifyPayment(reference){

  document.getElementById("loader").style.display = "block"

  try{
    const res = await fetch(`https://subuluke.onrender.com/api/paystack/verify/${reference}`)
    const data = await res.json()

    if(data.status === "success"){

      // ✅ CLEAR CART
      localStorage.removeItem("cart")

      // 🔥 REDIRECT WITH ORDER ID (IMPORTANT)
      window.location.href = `success.html?orderId=${data.orderId}`

    }else{
      showError("Payment was not successful. Please try again.")
    }

  }catch(err){
    console.error(err)
    showError("Could not verify payment. Try again.")
  }
}

/* ========================= HANDLE REDIRECT ========================= */
function checkPaymentStatus(){

  const params = new URLSearchParams(window.location.search)

  const reference = params.get("reference") || params.get("trxref")
  const status = params.get("status")

  if(reference){
    if(status === "failed"){
      showError("Transaction failed or was cancelled.")
      return
    }

    verifyPayment(reference)
  }
}

/* ========================= ERROR UI ========================= */
function showError(message){

  document.getElementById("loader").style.display = "none"

  let errorBox = document.getElementById("errorBox")

  if(!errorBox){
    errorBox = document.createElement("div")
    errorBox.id = "errorBox"
    errorBox.style.marginTop = "15px"
    errorBox.style.padding = "12px"
    errorBox.style.borderRadius = "8px"
    errorBox.style.background = "#ffdddd"
    errorBox.style.color = "#900"
    errorBox.style.fontWeight = "500"

    document.querySelector(".checkout").appendChild(errorBox)
  }

  errorBox.innerText = message
}

/* ========================= INIT ========================= */
window.onload = () => {
  checkPaymentStatus()
  renderCart()
}

/* ========================= NAV ========================= */
function goBack(){
  window.location.href = "cart.html"
}

</script>
 </body>  
</html>
