<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Subuluke</title>
<script src="https://js.paystack.co/v1/inline.js"></script>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* =========================
THEME & BASE
========================= */
:root{
  --bg:#FFF8E7;
  --text:#333;
  --accent:#E6A520;
  --softGold:#FFD77A;
  --card:rgba(255,255,255,0.35);
  --border:rgba(255,255,255,0.5);
  --shadow:0 8px 24px rgba(0,0,0,0.15);
  --muted:#666;
}
body.dark{
  --bg:#0F0F0F;
  --text:#F5F5F5;
  --card:rgba(20,20,20,0.55);
  --border:rgba(255,255,255,0.1);
  --shadow:0 8px 24px rgba(0,0,0,0.45);
  --muted:#AAA;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Poppins",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;}
/* =========================
HEADER
========================= */
.header{position:sticky;top:0;width:100%;z-index:1000;background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.2);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
body.dark .header{background:rgba(20,20,20,0.7);border-bottom:1px solid rgba(255,255,255,0.06);}
.header-left{display:flex;align-items:center;gap:12px;}
.header-right{display:flex;align-items:center;}
.logo{font-weight:700;font-size:20px;letter-spacing:1px;color:var(--text);}
body.dark .logo{color:var(--softGold);}
.icon,.back-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text);transition:.25s;}
.icon:hover{transform:scale(1.12);}
body.dark .icon,.back-btn{color:var(--softGold);}

/* =========================
PAGE & FORM
========================= */
.checkout{max-width:720px;margin:auto;padding:30px 20px;}
.form{display:flex;flex-direction:column;gap:12px;background:var(--card);padding:20px;border-radius:16px;border:1px solid var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:var(--shadow);}
.form label{font-size:14px;font-weight:500;margin-bottom:4px;}
.form input{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.4);font-size:14px;color:var(--text);outline:none;transition:.25s;}
body.dark .form input{background:rgba(20,20,20,0.5);}
.form input:focus{border:1px solid var(--accent);box-shadow:0 0 0 2px rgba(230,165,32,0.15);}

/* =========================
SUMMARY CARD
========================= */
.summary{margin-top:22px;background:var(--card);padding:20px;border-radius:16px;border:1px solid var(--border);backdrop-filter:blur(14px);box-shadow:var(--shadow);}
.summary-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;margin-bottom:12px;font-size:15px;}
.summary-content{display:none;}
.row{display:flex;justify-content:space-between;margin:8px 0;font-size:14px;}
.total{font-weight:700;font-size:18px;color:var(--accent);}
.cart-item{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05);}
body.dark .cart-item{border-bottom:1px solid rgba(255,255,255,0.06);}
.cart-item img{width:52px;height:52px;border-radius:10px;object-fit:cover;}
.cart-details{flex:1;}
.cart-details p{font-size:14px;}
.cart-price{font-weight:600;font-size:14px;color:var(--accent);}

/* =========================
PAY BUTTON & CARD
========================= */
.pay-card{display:flex;justify-content:center;padding:16px;border-radius:16px;background:var(--card);border:1px solid var(--border);backdrop-filter:blur(14px);box-shadow:var(--shadow);margin-top:20px;}
.pay-btn{width:260px;padding:14px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-weight:600;font-size:15px;cursor:pointer;transition:.25s;box-shadow:0 6px 16px rgba(230,165,32,0.35);}
.pay-btn:hover{background:var(--softGold);color:#000;transform:translateY(-2px);}
.loader{text-align:center;margin-top:20px;font-size:14px;color:var(--accent);display:none;}

/* =========================
MOBILE STICKY PAY BAR
========================= */
@media(max-width:768px){
  .checkout{padding:20px 16px;}
  .logo{font-size:18px;}
  .icon{font-size:16px;}
  .sticky-paybar{position:fixed;bottom:0;left:0;width:100%;padding:12px 16px;background:var(--card);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);z-index:1000;}
  .sticky-paybar .total{font-weight:700;font-size:16px;color:var(--accent);}
  .sticky-paybar .pay-btn{width:140px;padding:10px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button onclick="goBack()" class="back-btn"><i class="fas fa-arrow-left"></i></button>
    <div class="logo">Subuluke</div>
  </div>
  <div class="header-right">
    <button class="icon" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
  </div>
</header>

<!-- PAGE -->
<div class="checkout">

  <!-- FORM -->
  <div class="form">
    <label for="name">Full Name</label>
    <input id="name" placeholder="Enter your full name">

    <label for="email">Email</label>
    <input id="email" placeholder="Enter your email">

    <label for="phone">Phone Number</label>
    <input id="phone" placeholder="Enter your phone number">

    <label for="address">Delivery Address</label>
    <input id="address" placeholder="Enter your delivery address">
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="summary-header" onclick="toggleSummary()">
      <span>Order Summary</span>
      <span id="toggleIcon">▼</span>
    </div>
    <div id="summaryContent" class="summary-content">
      <div id="cartItems"></div>
      <hr style="margin:12px 0; opacity:0.2">
      <div class="row">
        <span>Subtotal</span>
        <span>₦<span id="subtotal">0</span></span>
      </div>
      <div class="row">
        <span>Delivery</span>
        <span>₦1500</span>
      </div>
      <div class="row total">
        <span>Total</span>
        <span>₦<span id="total">0</span></span>
      </div>
    </div>
  </div>

  <!-- PAY BUTTON CARD -->
  <div class="pay-card">
    <button class="pay-btn" onclick="pay()">Proceed to Payment</button>
  </div>

  <div class="loader" id="loader">Checking payment...</div>

</div>

<!-- MOBILE STICKY PAY BAR -->
<div class="sticky-paybar">
  <div class="total">₦<span id="totalMobile">0</span></div>
  <button class="pay-btn" onclick="pay()">Pay</button>
</div>

<script>

/* ========================= THEME ========================= */
function toggleTheme(){
  document.body.classList.toggle("dark")
  const isDark = document.body.classList.contains("dark")
  localStorage.setItem("theme", isDark ? "dark" : "light")
  updateThemeIcon()
}

function updateThemeIcon(){
  const moon = document.getElementById("moonIcon")
  const sun = document.getElementById("sunIcon")

  if(document.body.classList.contains("dark")){
    moon.style.display = "none"
    sun.style.display = "block"
  }else{
    moon.style.display = "block"
    sun.style.display = "none"
  }
}

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark")
}
updateThemeIcon()

// ===== PRICE FORMAT ====
function formatPrice(amount){
  return Number(amount).toLocaleString("en-NG")
}


/* ========================= CART ========================= */
let cart = JSON.parse(localStorage.getItem("cart")) || []

let subtotal = cart.reduce((sum,i)=>sum + i.price * i.qty,0)
//let delivery = 1500
//let total = subtotal + delivery
let total = subtotal

document.getElementById("subtotal").innerText = `₦${formatPrice(subtotal)}`
document.getElementById("total").innerText = `₦${formatPrice(total)}`

/* ========================= RENDER CART ========================= */
function renderCart() {
  const container = document.getElementById("cartItems")
  if (!container) return

  container.innerHTML = ""

  let subtotal = 0

  cart.forEach(item => {
    subtotal += item.price * item.qty

    const div = document.createElement("div")
    div.className = "cart-item"

    div.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <div class="cart-details">
        <p>${item.name}</p>
        <small>Qty: ${item.qty}</small>
      </div>
      <div class="cart-price">₦${formatPrice(item.price * item.qty)}</div>
    `
    container.appendChild(div)
  })

  const total = subtotal // Add delivery if needed: subtotal + 1500

  // Update summary totals
  document.getElementById("subtotal").innerText = formatPrice(subtotal)
  document.getElementById("total").innerText = formatPrice(total)

  // Update mobile sticky total
  const mobileTotal = document.getElementById("totalMobile")
  if (mobileTotal) mobileTotal.innerText = formatPrice(total)
}


/* ========================= TOGGLE SUMMARY ========================= */
function toggleSummary(){

  const content = document.getElementById("summaryContent")
  const icon = document.getElementById("toggleIcon")

  if(!content) return

  if(content.style.display === "none" || content.style.display === ""){
    content.style.display = "block"
    icon.innerText = "▲"
  }else{
    content.style.display = "none"
    icon.innerText = "▼"
  }
}

/* ========================= PAYMENT ========================= */
async function pay(){

  const name = document.getElementById("name").value
  const email = document.getElementById("email").value
  const phone = document.getElementById("phone").value
  const address = document.getElementById("address").value

  if(!name || !email || !phone || !address){
    alert("Please fill all fields")
    return
  }

  if(cart.length === 0){
    alert("Cart is empty")
    return
  }

  document.getElementById("loader").style.display = "block"

  try{

    const res = await fetch("https://subuluke.onrender.com/api/paystack/initialize",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        email,
        amount: total * 100,
        metadata:{
          name,
          email,
          phone,
          address,
          items: cart
        }
      })
    })

    const data = await res.json()

    if(data.authorization_url){
      window.location.href = data.authorization_url
    }else{
      alert("Payment initialization failed")
    }

  }catch(err){
    console.error(err)
    alert("Something went wrong")
  }
}

/* ========================= VERIFY ========================= */
async function verifyPayment(reference){

  document.getElementById("loader").style.display = "block"

  try{
    const res = await fetch(`https://subuluke.onrender.com/api/paystack/verify/${reference}`)
    const data = await res.json()

    if(data.status === "success"){

      // ✅ CLEAR CART
      localStorage.removeItem("cart")

      // 🔥 REDIRECT WITH ORDER ID (IMPORTANT)
      window.location.href = `success.html?orderId=${data.orderId}`

    }else{
      showError("Payment was not successful. Please try again.")
    }

  }catch(err){
    console.error(err)
    showError("Could not verify payment. Try again.")
  }
}

/* ========================= HANDLE REDIRECT ========================= */
function checkPaymentStatus(){

  const params = new URLSearchParams(window.location.search)

  const reference = params.get("reference") || params.get("trxref")
  const status = params.get("status")

  if(reference){
    if(status === "failed"){
      showError("Transaction failed or was cancelled.")
      return
    }

    verifyPayment(reference)
  }
}

/* ========================= ERROR UI ========================= */
function showError(message){

  document.getElementById("loader").style.display = "none"

  let errorBox = document.getElementById("errorBox")

  if(!errorBox){
    errorBox = document.createElement("div")
    errorBox.id = "errorBox"
    errorBox.style.marginTop = "15px"
    errorBox.style.padding = "12px"
    errorBox.style.borderRadius = "8px"
    errorBox.style.background = "#ffdddd"
    errorBox.style.color = "#900"
    errorBox.style.fontWeight = "500"

    document.querySelector(".checkout").appendChild(errorBox)
  }

  errorBox.innerText = message
}


/* ========================= INIT ========================= */
window.onload = () => {
  checkPaymentStatus()
  renderCart()
}

/* ========================= NAV ========================= */
function goBack(){
  window.location.href = "cart.html"
}

</script>
</body>
</html>
