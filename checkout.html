<!DOCTYPE html> 
 <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Checkout - Subuluke</title> 
 <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>  
  
/* ========================= THEME ========================= */  
:root {  
  --bg-gradient: linear-gradient(to bottom, #FFF8E7 0%, #FFD77A 100%);  
  --bg: #FFF8E7;  
  --header-gradient: linear-gradient(135deg, #E6A520 0%, #FFD77A 100%);  
  --card: rgba(255,248,231,1.10);  
  --text: #3a2a00;  
  --muted: #777;  
  --border: rgba(255,255,255,0.25);  
  --accent: #E6A520;  
}  
  
body.dark {  
  --bg-gradient: linear-gradient(to bottom, #121212 0%, #1A1A1A 100%);  
  --bg: #0F0F0F;  
  --header-gradient: linear-gradient(135deg, #121212 0%, #1A1A1A 100%);  
  --card: rgba(26,26,26,0.65);  
  --text: #F5F5F5;  
  --muted: #BBBBBB;  
  --border: rgba(255,255,255,0.15);  
}  
  
/* ========================= BASE ========================= */  
*{margin:0;padding:0;box-sizing:border-box;}  
  
body{  
  font-family:system-ui;  
  background:var(--bg-gradient);  
  color:var(--text);  
}  
  
/* =========================
HEADER
========================= */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;

  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;

  background: var(--header-gradient);
  border-bottom: 1px solid rgba(255,255,255,0.18);
  border-radius: 0 0 14px 14px;

  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
}

.header-right{
  display:flex;
  align-items:center;
}

.back-btn{
  background: transparent;
  border:1px solid var(--border);
  width:36px;
  height:36px;
  border-radius:8px;
  cursor:pointer;
  color:var(--text);
}

.back-btn:hover{
  background: var(--accent);
  color:#000;
}

/* ========================= PAGE ========================= */  
.checkout{  
  max-width:700px;  
  margin:auto;  
  padding:20px;  
}  
  
/* FORM */  
.form{  
  display:flex;  
  flex-direction:column;  
  gap:12px;  
  background:var(--card);  
  padding:15px;  
  border-radius:12px;  
  border:1px solid var(--border);  
}  
  
.form input{  
  padding:12px;  
  border-radius:8px;  
  border:1px solid var(--border);  
  background:transparent;  
  color:var(--text);  
}  
  
/* SUMMARY */  
.summary{  
  margin-top:20px;  
  background:var(--card);  
  padding:15px;  
  border-radius:12px;  
  border:1px solid var(--border);  
}  
  
.row{  
  display:flex;  
  justify-content:space-between;  
  margin:8px 0;  
}  
  
.total{  
  font-weight:700;  
  font-size:18px;  
}  
  
/* BUTTON */  
.pay-btn{  
  margin-top:20px;  
  width:100%;  
  padding:14px;  
  border:none;  
  border-radius:10px;  
  background:var(--accent);  
  font-weight:600;  
  cursor:pointer;  
}  
  
/* LOADER */  
.loader{  
  text-align:center;  
  margin-top:20px;  
  display:none;  
}  

/* COLLAPSIBLE SUMMARY */
.summary-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-weight:600;
  margin-bottom:10px;
}

.summary-content{
  display:none;
}

/* PRODUCT ITEM */
.cart-item{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  align-items:center;
}

.cart-item img{
  width:50px;
  height:50px;
  border-radius:8px;
  object-fit:cover;
}

.cart-details{
  flex:1;
}

.cart-details p{
  font-size:14px;
}

.cart-price{
  font-weight:600;
  font-size:14px;
}
</style>

  </head> 
 <body> 

 <!-- HEADER --> 

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button onclick="goBack()" class="back-btn">←</button>
    <div class="logo">Subuluke</div>
  </div>

  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">

      <svg id="moonIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>

        <!-- Sun Icon -->
  <svg id="sunIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>
    </div>
  </div>
</header>

 <!-- PAGE -->  <div class="checkout">    <!-- FORM -->   

 <div class="form">  
    <input id="name" placeholder="Full Name">  
    <input id="email" placeholder="Email">  
    <input id="phone" placeholder="Phone Number">  
    <input id="address" placeholder="Delivery Address">  

  </div>   

 <!-- SUMMARY -->  
<div class="summary">

  <!-- COLLAPSIBLE HEADER -->
  <div class="summary-header" onclick="toggleSummary()">
    <span>Order Summary</span>
    <span id="toggleIcon">▼</span>
  </div>

  <!-- COLLAPSIBLE CONTENT -->
  <div id="summaryContent" class="summary-content">

    <!-- PRODUCTS LIST -->
    <div id="cartItems"></div>

    <hr style="margin:12px 0; opacity:0.2">

    <!-- TOTALS -->
    <div class="row">
      <span>Subtotal</span>
      <span>₦<span id="subtotal">0</span></span>
    </div>

    <div class="row">
      <span>Delivery</span>
      <span>₦1500</span>
    </div>

    <div class="row total">
      <span>Total</span>
      <span>₦<span id="total">0</span></span>
    </div>

  </div>

</div>

  </div>  <button class="pay-btn" onclick="pay()">Proceed to Payment</button>

  <div class="loader" id="loader">Checking payment...</div> 

 </div>  

<script>

/* ========================= THEME ========================= */
function toggleTheme(){
  document.body.classList.toggle("dark")
  const isDark = document.body.classList.contains("dark")
  localStorage.setItem("theme", isDark ? "dark" : "light")
  updateThemeIcon()
}

function updateThemeIcon(){
  const moon = document.getElementById("moonIcon")
  const sun = document.getElementById("sunIcon")

  if(document.body.classList.contains("dark")){
    moon.style.display = "none"
    sun.style.display = "block"
  }else{
    moon.style.display = "block"
    sun.style.display = "none"
  }
}

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark")
}
updateThemeIcon()

/* ========================= CART ========================= */
let cart = JSON.parse(localStorage.getItem("cart")) || []

let subtotal = cart.reduce((sum,i)=>sum + i.price * i.qty,0)
let delivery = 1500
let total = subtotal + delivery

document.getElementById("subtotal").innerText = subtotal
document.getElementById("total").innerText = total

/* ========================= RENDER CART ========================= */
function renderCart(){

  const container = document.getElementById("cartItems")
  if(!container) return

  container.innerHTML = ""

  cart.forEach(item => {

    const div = document.createElement("div")
    div.className = "cart-item"

    div.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <div class="cart-details">
        <p>${item.name}</p>
        <small>Qty: ${item.qty}</small>
      </div>
      <div class="cart-price">₦${item.price * item.qty}</div>
    `

    container.appendChild(div)
  })
}

/* ========================= TOGGLE SUMMARY ========================= */
function toggleSummary(){

  const content = document.getElementById("summaryContent")
  const icon = document.getElementById("toggleIcon")

  if(!content) return

  if(content.style.display === "none" || content.style.display === ""){
    content.style.display = "block"
    icon.innerText = "▲"
  }else{
    content.style.display = "none"
    icon.innerText = "▼"
  }
}

/* ========================= PAYMENT ========================= */
async function pay(){

  const name = document.getElementById("name").value
  const email = document.getElementById("email").value
  const phone = document.getElementById("phone").value
  const address = document.getElementById("address").value

  if(!name || !email || !phone || !address){
    alert("Please fill all fields")
    return
  }

  if(cart.length === 0){
    alert("Cart is empty")
    return
  }

  document.getElementById("loader").style.display = "block"

  try{

    const res = await fetch("https://subuluke.onrender.com/api/paystack/initialize",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        email,
        amount: total * 100,
        metadata:{
          name,
          email,
          phone,
          address,
          items: cart
        }
      })
    })

    const data = await res.json()

    if(data.authorization_url){
      window.location.href = data.authorization_url
    }else{
      alert("Payment initialization failed")
    }

  }catch(err){
    console.error(err)
    alert("Something went wrong")
  }
}

/* ========================= VERIFY ========================= */
async function verifyPayment(reference){

  document.getElementById("loader").style.display = "block"

  try{
    const res = await fetch(`https://subuluke.onrender.com/api/paystack/verify/${reference}`)
    const data = await res.json()

    if(data.status === "success"){
      localStorage.removeItem("cart")
      window.location.href = "success.html"
    }else{
      showError("Payment was not successful. Please try again.")
    }

  }catch(err){
    console.error(err)
    showError("Could not verify payment. Try again.")
  }
}

/* ========================= HANDLE REDIRECT ========================= */
function checkPaymentStatus(){

  const params = new URLSearchParams(window.location.search)

  const reference = params.get("reference") || params.get("trxref")
  const status = params.get("status")

  if(reference){
    if(status === "failed"){
      showError("Transaction failed or was cancelled.")
      return
    }

    verifyPayment(reference)
  }
}

/* ========================= ERROR UI ========================= */
function showError(message){

  document.getElementById("loader").style.display = "none"

  let errorBox = document.getElementById("errorBox")

  if(!errorBox){
    errorBox = document.createElement("div")
    errorBox.id = "errorBox"
    errorBox.style.marginTop = "15px"
    errorBox.style.padding = "12px"
    errorBox.style.borderRadius = "8px"
    errorBox.style.background = "#ffdddd"
    errorBox.style.color = "#900"
    errorBox.style.fontWeight = "500"

    document.querySelector(".checkout").appendChild(errorBox)
  }

  errorBox.innerText = message
}

/* ========================= INIT ========================= */
window.onload = () => {
  checkPaymentStatus()
  renderCart()
}

/* ========================= NAV ========================= */
function goBack(){
  window.location.href = "cart.html"
}

</script>
 </body>  
</html>
