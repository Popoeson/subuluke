<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Subuluke Store</title>

<style>

/* =========================
THEME VARIABLES
========================= */

:root{
--bg:#FFF8E7;
--header:#ffffff;
--sidebar:#ffffff;
--card:#ffffff;
--text:#333;
--muted:#777;
--border:#eee;
--accent:#E6A520;
--softGold:#FFD77A;
}

body.dark{
--bg:#0F0F0F;
--header:#121212;
--sidebar:#111;
--card:#1A1A1A;
--text:#F5F5F5;
--muted:#BBBBBB;
--border:#2A2A2A;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

/* =========================
HEADER
========================= */

.header{
height:72px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 28px;
border-bottom:1px solid var(--border);
background:var(--header);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:700;
}

.header-right{
display:flex;
gap:20px;
align-items:center;
}

.theme-toggle{
cursor:pointer;
font-size:18px;
}

/* =========================
CATEGORY TABS
========================= */

.categories{
display:flex;
gap:12px;
padding:18px 24px;
overflow:auto;
}

.category-pill{
padding:8px 18px;
border:1px solid var(--border);
border-radius:999px;
cursor:pointer;
}

.category-pill.active{
background:var(--accent);
color:white;
border:none;
}

/* =========================
HERO
========================= */

.hero{
height:500px;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

.hero-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

.hero-overlay h1{
font-size:52px;
margin-bottom:16px;
}

.hero-overlay p{
font-size:20px;
}

/* =========================
SECTION TITLE
========================= */

.section-title{
text-align:center;
padding:60px 20px;
}

.section-title h2{
font-size:36px;
margin-bottom:12px;
}

.section-title p{
color:var(--muted);
}

/* =========================
PRODUCT GRID
========================= */

.products{
max-width:1280px;
margin:auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:28px;
padding:20px;
}

@media(max-width:1100px){
.products{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:768px){
.products{
grid-template-columns:repeat(2,1fr);
}
}

/* =========================
PRODUCT CARD
========================= */

.product-card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
}

.product-image{
position:relative;
}

.product-image img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
}

/* BADGES */

.badge{
position:absolute;
top:10px;
left:10px;
background:var(--accent);
color:white;
font-size:12px;
padding:4px 10px;
border-radius:20px;
}

.badge.sale{
right:10px;
left:auto;
background:#d62828;
}

.badge.out{
background:#777;
}

/* PRODUCT BODY */

.product-body{
padding:18px;
}

.product-category{
font-size:12px;
color:var(--muted);
margin-bottom:6px;
}

.product-name{
font-weight:600;
margin-bottom:8px;
}

.price{
display:flex;
gap:10px;
align-items:center;
margin-top:4px;
}

.old-price{
text-decoration:line-through;
color:var(--muted);
font-size:14px;
}

.new-price{
font-weight:700;
font-size:18px;
color:var(--accent);
}

.add-cart{
margin-top:14px;
width:100%;
padding:10px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

.add-cart.disabled{
background:#999;
cursor:not-allowed;
}

/* =========================
FOOTER
========================= */

.footer{
margin-top:80px;
padding:60px 20px;
border-top:1px solid var(--border);
text-align:center;
}

</style>
</head>

<body>

<header class="header">

<div class="logo">Subuluke</div>

<div class="header-right">
<div class="theme-toggle" onclick="toggleTheme()">🌙</div>
</div>

</header>


<div class="categories" id="categories"></div>


<section class="hero" id="heroSection"></section>


<div class="section-title">
<h2>Our Collection</h2>
<p>Discover our latest pieces curated for you</p>
</div>


<section class="products" id="products"></section>


<footer class="footer">
<p>© 2026 Subuluke Store</p>
</footer>


<script>

const API="https://subuluke.onrender.com"

/* =========================
THEME TOGGLE
========================= */

function toggleTheme(){

document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark")
}else{
localStorage.setItem("theme","light")
}

}

const savedTheme=localStorage.getItem("theme")

if(savedTheme==="dark"){
document.body.classList.add("dark")
}

/* =========================
LOAD HERO
========================= */

async function loadHero(){

try{

const res=await fetch(API+"/api/hero-images")
const heroes=await res.json()

if(!heroes.length) return

const activeHero=heroes.find(h=>h.isActive) || heroes[0]

document.getElementById("heroSection").innerHTML=`

<img src="${activeHero.imageUrl}">

`

}catch(err){
console.log("Hero load error:",err)
}

}

/* =========================
LOAD PRODUCTS
========================= */

async function loadProducts(){

try{

const res=await fetch(API+"/api/products")
const products=await res.json()

renderProducts(products)
renderCategories(products)

}catch(err){

console.log("Product load error:",err)

}

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(products){

const container=document.getElementById("products")
container.innerHTML=""

products.forEach(p=>{

const out=p.status==="out_of_stall"

const card=document.createElement("div")
card.className="product-card"

card.innerHTML=`

<div class="product-image">

<img src="${p.mainImage}">

${p.featured?'<div class="badge">FEATURED</div>':""}

${p.slashPrice>0?'<div class="badge sale">SALE</div>':""}

${out?'<div class="badge out">OUT OF STALL</div>':""}

</div>

<div class="product-body">

<div class="product-category">${p.category}</div>

<div class="product-name">${p.name}</div>

<div class="price">

${p.slashPrice>0?`<span class="old-price">₦${p.slashPrice}</span>`:""}

<span class="new-price">₦${p.price}</span>

</div>

<button class="add-cart ${out?'disabled':''}" ${out?'disabled':''}>

${out?"Out of Stall":"Add to Cart"}

</button>

</div>
`

container.appendChild(card)

})

}

/* =========================
CATEGORIES
========================= */

function renderCategories(products){

const cats=[...new Set(products.map(p=>p.category))]

const container=document.getElementById("categories")

container.innerHTML=`<div class="category-pill active" onclick="filterProducts('All')">All</div>`

cats.forEach(c=>{

const pill=document.createElement("div")
pill.className="category-pill"
pill.innerText=c

pill.onclick=()=>{

document.querySelectorAll(".category-pill").forEach(p=>p.classList.remove("active"))

pill.classList.add("active")

filterProducts(c)

}

container.appendChild(pill)

})

}

async function filterProducts(category){

const res=await fetch(API+"/api/products")
const products=await res.json()

if(category==="All"){
renderProducts(products)
return
}

renderProducts(products.filter(p=>p.category===category))

}

/* =========================
INIT
========================= */

loadHero()
loadProducts()

</script>

</body>
</html>
