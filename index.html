<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subuluke Store</title>

<style>
/* =========================
THEME VARIABLES
========================= */
:root {
  --bg-gradient: linear-gradient(to bottom, #FFF8E7 0%, #FFD77A 100%);
  --bg: #FFF8E7;
  --header-gradient: linear-gradient(135deg, #E6A520 0%, #FFD77A 100%);
  --card: rgba(255,248,231,0.65);
  --text: #3a2a00;
  --muted: #777;
  --border: rgba(255,255,255,0.25);
  --accent: #E6A520;
  --softGold: #FFD77A;
}

body.dark {
  --bg-gradient: linear-gradient(to bottom, #121212 0%, #1A1A1A 100%);
  --bg: #0F0F0F;
  --header-gradient: linear-gradient(135deg, #121212 0%, #1A1A1A 100%);
  --card: rgba(26,26,26,0.65);
  --text: #F5F5F5;
  --muted: #BBBBBB;
  --border: rgba(255,255,255,0.15);
}

/* =========================
BASE
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-gradient);
  color: var(--text);
  transition: background 0.4s, color 0.4s;
}

/* =========================
HEADER
========================= */
/* -------------------------
Header Theme & Glass
------------------------- */
.header {
  position: sticky;      /* sticky to top */
  top: 0;
  z-index: 1000;         /* above everything */

  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;

  background: var(--header-gradient);
  color: var(--text);

  border-bottom: 1px solid rgba(255,255,255,0.18);
  border-radius: 0 0 14px 14px;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.25);

  transition: background 0.4s, color 0.4s;
}

/* Glass layer */
.header::before {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.05);  /* light transparency */
  z-index: 0;
  pointer-events: none;
}

/* Reflection / shine layer */
.header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.03),
    transparent
  );
  z-index: 0;
  pointer-events: none;
}

/* Ensure content is above pseudo-elements */
.header > * {
  position: relative;
  z-index: 1;
}

/* Logo */
.logo {
  font-size: 22px;
  font-weight: 700;
}

/* Header right group */
.header-right {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* Theme toggle container */
.theme-toggle {
  cursor: pointer;
  display: flex;
  align-items: center;
}

/* -------------------------
Header Icons
------------------------- */
:root { --icon-color: #3a2a00; }      /* light mode */
body.dark { --icon-color: var(--softGold); } /* dark mode */

.cart-icon svg,
.theme-toggle svg,
.hamburger {
  stroke: var(--icon-color);
  color: var(--icon-color);
  transition: all 0.3s;
}

.cart-icon:hover svg,
.theme-toggle:hover svg,
.hamburger:hover {
  filter: drop-shadow(0 0 6px var(--softGold));
}

/* =========================
CART BADGE
========================= */

.cart-icon{
  position: relative;
  cursor: pointer;
}

/* BADGE */

.cart-badge{
  position: absolute;
  top: -6px;
  right: -8px;

  min-width: 18px;
  height: 18px;
  padding: 0 5px;

  border-radius: 20px;

  background: var(--accent);
  color: #000;

  font-size: 11px;
  font-weight: 600;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 0 8px var(--softGold);

  transition: transform 0.2s ease, opacity 0.2s ease;
}

/* HIDE WHEN EMPTY */

.cart-badge:empty{
  display:none;
}

/* -------------------------
Hamburger (mobile)
------------------------- */
.hamburger {
  display: none;
  font-size: 22px;
  cursor: pointer;
}

/* -------------------------
Mobile Sidebar
------------------------- */
.sidebar-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45);
  display: none;
  z-index: 900;
}

.mobile-sidebar {
  position: fixed;
  top: 72px;                   /* below header */
  left: -280px;
  width: 260px;
  height: calc(100% - 72px);   /* full height minus header */
  background: var(--card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--border);
  padding: 20px;
  transition: left 0.3s ease;
  z-index: 950;
  box-shadow: 4px 0 20px rgba(0,0,0,0.25);
  border-radius: 0 0 14px 0;
}

/* Sidebar active */
.mobile-sidebar.active {
  left: 0;
}

/* Overlay active */
.sidebar-overlay.active {
  display: block;
}

/* Sidebar header */
.sidebar-header {
  margin-bottom: 20px;
  font-weight: 600;
  color: var(--text);
}

/* Mobile category items */
.mobile-category {
  padding: 12px 14px;
  border-left: 4px solid transparent;
  cursor: pointer;
  color: var(--text);
  transition: all 0.25s ease;
  border-radius: 6px;
  backdrop-filter: blur(8px);
  margin: 10px;
}

.mobile-category:hover {
  background: rgba(255,255,255,0.08);
}

/* Active sidebar item */
.mobile-category.active {
  color: var(--softGold);
  border-left: 4px solid var(--accent);
  background: rgba(255,215,122,0.12);
  font-weight: 500;
  backdrop-filter: blur(12px);
}

/* -------------------------
Category Tabs (desktop)
------------------------- */
.categories {
  display: flex;
  gap: 12px;
  padding: 18px 24px;
  overflow: auto;
  scroll-behavior: smooth;
}

.category-pill {
  padding: 8px 18px;
  border-radius: 999px;
  cursor: pointer;
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  color: var(--text);
  transition: all 0.3s;
}

.category-pill:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.category-pill.active {
  background: var(--accent);
  color: white;
  border: none;
}

/* -------------------------
Responsive
------------------------- */
@media (max-width: 768px) {
  .categories {
    display: none;
  }
  .hamburger {
    display: block;
  }
}

/* =========================
HERO
===========================*/

.hero{
  width:100%;
  height:500px;

  position:relative;
  overflow:hidden;

  margin:0;
  border-radius:0;

  box-shadow:none;
}

/* TRACK */

.hero-track{
  position:relative;
  width:100%;
  height:100%;
}

/* SLIDE */

.hero-slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 0.8s ease;
}

.hero-slide.active{
  opacity:1;
  z-index:2;
}

.hero-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY */

.hero-overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#fff;

  padding:22px 36px;
  border-radius:14px;

  background:rgba(0,0,0,0.35);

  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);

  box-shadow:0 10px 24px rgba(0,0,0,0.25);
}

.hero-overlay h1{
  font-size:48px;
  margin-bottom:12px;
  font-weight:700;
}

.hero-overlay p{
  font-size:20px;
  opacity:0.9;
}

/* ARROWS */

.hero-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:48px;
  height:48px;

  border:none;
  border-radius:50%;

  background:rgba(0,0,0,0.4);
  color:#fff;
  font-size:24px;

  cursor:pointer;
  z-index:5;

  backdrop-filter:blur(6px);
}

.hero-prev{
  left:24px;
}

.hero-next{
  right:24px;
}

.hero-arrow:hover{
  background:rgba(0,0,0,0.65);
}

/* DOTS */

.hero-dots{
  position:absolute;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:5;
}

.hero-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  cursor:pointer;
  transition:all 0.3s;
}

.hero-dot.active{
  background:#E6A520;
  transform:scale(1.2);
}

/* RESPONSIVE */

@media(max-width:768px){

.hero{
  height:360px;
}

.hero-overlay h1{
  font-size:32px;
}

.hero-overlay p{
  font-size:16px;
}

.hero-arrow{
  width:38px;
  height:38px;
}

}

/* =========================
SECTION TITLE
========================= */
.section-title {
  text-align: left;
  padding: 55px 23px;
}

.section-title h2 {
  font-size: 32px;
  margin-bottom: 10px;
}

.section-title p {
  color: var(--muted);
}

/* =========================
PRODUCT CARD (PREMIUM)
========================= */

.product-card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;

  display: flex;
  flex-direction: column;

  transition: transform 0.35s ease, box-shadow 0.35s ease;
  position: relative;
}

/* HOVER EFFECT */
.product-card:hover{
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 16px 40px rgba(0,0,0,0.25);
}

/* IMAGE */

.product-image{
  position: relative;
  overflow: hidden;
}

.product-image img{
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;

  transition: transform 0.6s ease;
}

.product-card:hover .product-image img{
  transform: scale(1.08);
}

/* BADGES */

.badge{
  position:absolute;
  top:12px;
  left:12px;

  font-size:11px;
  padding:5px 12px;
  border-radius:20px;

  background: rgba(230,165,32,0.9);
  color:#fff;

  backdrop-filter: blur(6px);
}

.badge.sale{
  left:auto;
  right:12px;
  background: rgba(214,40,40,0.9);
}

.badge.out{
  background: rgba(120,120,120,0.9);
}

/* BODY */

.product-body{
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* CATEGORY */

.product-category{
  font-size:11px;
  text-transform: uppercase;
  letter-spacing:0.5px;
  color: var(--muted);
}

/* NAME */

.product-name{
  font-weight:600;
  font-size:16px;
  line-height:1.4;
}

/* PRICE */

.price{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:6px;
}

.old-price{
  text-decoration: line-through;
  color: var(--muted);
  font-size:13px;
}

.new-price{
  font-weight:700;
  font-size:20px;
  color: var(--accent);
}

/* FLOATING ADD TO CART */

.add-cart{
  position:absolute;
  bottom:16px;
  right:16px;

  width:44px;
  height:44px;

  border:none;
  border-radius:50%;

  background: rgba(0,0,0,0.7);
  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
  transition: all 0.3s;
}

/* ICON INSIDE BUTTON */
.add-cart svg{
  width:20px;
  height:20px;
}

/* HOVER */
.product-card:hover .add-cart{
  background: var(--accent);
  color:#000;
  transform: scale(1.1);
}

/* DISABLED */
.add-cart.disabled{
  background:#777;
  cursor:not-allowed;
  transform:none;
}

/* =========================
FOOTER
========================= */
.footer {
  margin-top: 80px;
  padding: 60px 20px;
  background: var(--header-gradient);
  color: var(--text);
  text-align: center;
  border-radius: 12px 12px 0 0;
  box-shadow: 0 -4px 12px rgba(122,74,0,0.25);
  transition: background 0.4s, color 0.4s;
}
</style>
</head>

<body>

<header class="header">

  <div class="logo">Subuluke</div>

  <div class="header-right">

    <!-- Cart Icon -->
    <a href="cart.html" class="cart-icon">

  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="20" cy="21" r="1"></circle>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h7.72a2 2 0 0 0 2-1.61L23 6H6"></path>
  </svg>

  <span id="cartCount" class="cart-badge">0</span>

</a>

    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">

  <!-- Moon Icon -->
  <svg id="moonIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 
    7 7 0 0 0 21 12.79z"></path>
  </svg>

  <!-- Sun Icon -->
  <svg id="sunIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>

</div>
    <!-- Hamburger -->
    <div class="hamburger" onclick="toggleSidebar()">
      ☰
    </div>

  </div>

</header>

<!-- Desktop Categories -->
<div class="categories" id="categories"></div>

<!-- Mobile Sidebar -->
<div class="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="mobile-sidebar">

  <div class="sidebar-header">
    <h3>Categories</h3>
  </div>

  <div id="mobileCategories"></div>

</div>


<!-- HERO -->
<section class="hero" id="heroSection">

  <div class="hero-track" id="heroTrack"></div>

  <!-- ARROWS -->
  <button class="hero-arrow hero-prev" id="heroPrev">
    &#10094;
  </button>

  <button class="hero-arrow hero-next" id="heroNext">
    &#10095;
  </button>

  <!-- DOTS -->
  <div class="hero-dots" id="heroDots"></div>

</section>

<div class="section-title">
  <h2>Our Collection</h2>
  <p>Discover our latest pieces curated for you</p>
</div>

<section class="products" id="products"></section>

<footer class="footer">
  <p>© 2026 Subuluke Store</p>
</footer>

<script>

const API="https://subuluke.onrender.com"

let allProducts=[]

/* =========================
THEME TOGGLE
========================= */
function toggleTheme(){

  document.body.classList.toggle("dark")

  const isDark = document.body.classList.contains("dark")

  localStorage.setItem("theme", isDark ? "dark" : "light")

  updateThemeIcon()

}

// ICON SWITCH
function updateThemeIcon(){

  const moon = document.getElementById("moonIcon")
  const sun = document.getElementById("sunIcon")

  if(document.body.classList.contains("dark")){
    moon.style.display="none"
    sun.style.display="block"
  }else{
    moon.style.display="block"
    sun.style.display="none"
  }

}

// LOAD THEME
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark")
}

updateThemeIcon()

/* =========================
SIDEBAR
========================= */

function toggleSidebar(){
  document.querySelector(".mobile-sidebar").classList.add("active")
  document.querySelector(".sidebar-overlay").classList.add("active")
}

function closeSidebar(){
  document.querySelector(".mobile-sidebar").classList.remove("active")
  document.querySelector(".sidebar-overlay").classList.remove("active")
}

/* =========================
LOAD HERO
========================= */

let heroIndex = 0
let heroTimer

async function loadHero(){

  try{

    const res = await fetch(API + "/api/hero-images")
    const heroes = await res.json()

    const activeHeroes = heroes.filter(h => h.isActive)

    if(!activeHeroes.length) return

    const track = document.getElementById("heroTrack")
    const dotsContainer = document.getElementById("heroDots")

    track.innerHTML = ""
    dotsContainer.innerHTML = ""

    activeHeroes.forEach((hero,i)=>{

      /* SLIDE */

      const slide = document.createElement("div")
      slide.className = "hero-slide"
      if(i===0) slide.classList.add("active")

      slide.innerHTML = `
        <img src="${hero.imageUrl}" loading="${i===0 ? "eager":"lazy"}">
        <div class="hero-overlay">
          <h1>Welcome to Subuluke</h1>
          <p>Explore our premium collection</p>
        </div>
      `

      track.appendChild(slide)

      /* DOT */

      const dot = document.createElement("div")
      dot.className = "hero-dot"
      if(i===0) dot.classList.add("active")

      dot.onclick = ()=>goToHero(i)

      dotsContainer.appendChild(dot)

    })

    startHeroSlider()

  }catch(err){
    console.log("Hero load error:",err)
  }

}

/* =========================
SLIDER LOGIC
========================= */

function showHero(index){

  const slides = document.querySelectorAll(".hero-slide")
  const dots = document.querySelectorAll(".hero-dot")

  slides.forEach(s=>s.classList.remove("active"))
  dots.forEach(d=>d.classList.remove("active"))

  slides[index].classList.add("active")
  dots[index].classList.add("active")

}

/* NEXT */

function nextHero(){

  const slides = document.querySelectorAll(".hero-slide")

  heroIndex++

  if(heroIndex >= slides.length){
    heroIndex = 0
  }

  showHero(heroIndex)

}

/* PREV */

function prevHero(){

  const slides = document.querySelectorAll(".hero-slide")

  heroIndex--

  if(heroIndex < 0){
    heroIndex = slides.length - 1
  }

  showHero(heroIndex)

}

/* DOT CLICK */

function goToHero(index){

  heroIndex = index
  showHero(heroIndex)

}

/* AUTO SLIDE */

function startHeroSlider(){

  heroTimer = setInterval(()=>{
    nextHero()
  },6000)

}

/* =========================
ARROW EVENTS
========================= */

document.getElementById("heroNext").onclick = ()=>{
  nextHero()
}

document.getElementById("heroPrev").onclick = ()=>{
  prevHero()
}

/* =========================
MOBILE SWIPE
========================= */

let touchStartX = 0
let touchEndX = 0

const hero = document.getElementById("heroSection")

hero.addEventListener("touchstart",e=>{
  touchStartX = e.changedTouches[0].screenX
})

hero.addEventListener("touchend",e=>{

  touchEndX = e.changedTouches[0].screenX

  if(touchEndX < touchStartX - 50){
    nextHero()
  }

  if(touchEndX > touchStartX + 50){
    prevHero()
  }

})
/* =========================
LOAD PRODUCTS
========================= */

async function loadProducts(){

  try{

    const res = await fetch(API+"/api/products")
    const products = await res.json()

    allProducts = products

    renderProducts(products)
    renderCategories(products)

  }catch(err){

    console.log("Product load error:",err)

  }

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(products){

  const container=document.getElementById("products")

  container.innerHTML=""

  products.forEach(p=>{

    const out = p.status==="out_of_stall"

    const card=document.createElement("div")

    card.className="product-card"

    card.innerHTML=`

      <div class="product-image">

        <img src="${p.mainImage}">

        ${p.featured ? '<div class="badge">FEATURED</div>' : ""}

        ${p.slashPrice>0 ? '<div class="badge sale">SALE</div>' : ""}

        ${out ? '<div class="badge out">OUT OF STALL</div>' : ""}

      </div>

      <div class="product-body">

        <div class="product-category">${p.category}</div>

        <div class="product-name">${p.name}</div>

        <div class="price">

          ${p.slashPrice>0 ? `<span class="old-price">₦${p.slashPrice}</span>` : ""}

          <span class="new-price">₦${p.price}</span>

        </div>

        <button 
  class="add-cart ${out?'disabled':''}" 
  ${out?'disabled':''}
  onclick="addToCart('${p._id}')"
>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="20" cy="21" r="1"></circle>
    <path d="M1 1h4l2.6 13.4a2 2 0 0 0 2 1.6h9.8a2 2 0 0 0 2-1.6L23 6H6"></path>
  </svg>
</button>

      </div>

    `

    container.appendChild(card)

  })

}

/* =========================
FILTER PRODUCTS
========================= */

function filterProducts(category){

  if(category==="All"){

    renderProducts(allProducts)

    return

  }

  const filtered = allProducts.filter(p=>p.category===category)

  renderProducts(filtered)

}

/* =========================
RENDER CATEGORIES
========================= */
function renderCategories(products) {
  const cats = [...new Set(products.map(p => p.category))];

  const container = document.getElementById("categories");
  const mobileContainer = document.getElementById("mobileCategories");

  // Clear previous categories
  container.innerHTML = "";
  mobileContainer.innerHTML = "";

  // --- ALL CATEGORY ---
  const allPill = document.createElement("div");
  allPill.className = "category-pill active";
  allPill.innerText = "All";
  allPill.onclick = () => {
    document.querySelectorAll(".category-pill").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".mobile-category").forEach(p => p.classList.remove("active"));

    allPill.classList.add("active");
    mobileAll.classList.add("active");

    filterProducts("All");
  };
  container.appendChild(allPill);

  const mobileAll = document.createElement("div");
  mobileAll.className = "mobile-category active";
  mobileAll.innerText = "All";
  mobileAll.onclick = () => {
    document.querySelectorAll(".category-pill").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".mobile-category").forEach(p => p.classList.remove("active"));

    allPill.classList.add("active");
    mobileAll.classList.add("active");

    filterProducts("All");
    closeSidebar();
  };
  mobileContainer.appendChild(mobileAll);

  // --- OTHER CATEGORIES ---
  cats.forEach(c => {
    // Desktop pill
    const pill = document.createElement("div");
    pill.className = "category-pill";
    pill.innerText = c;
    pill.onclick = () => {
      document.querySelectorAll(".category-pill").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".mobile-category").forEach(p => p.classList.remove("active"));

      pill.classList.add("active");
      mobileItem.classList.add("active");

      filterProducts(c);
    };
    container.appendChild(pill);

    // Mobile item
    const mobileItem = document.createElement("div");
    mobileItem.className = "mobile-category";
    mobileItem.innerText = c;
    mobileItem.onclick = () => {
      document.querySelectorAll(".category-pill").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".mobile-category").forEach(p => p.classList.remove("active"));

      pill.classList.add("active");
      mobileItem.classList.add("active");

      filterProducts(c);
      closeSidebar();
    };
    mobileContainer.appendChild(mobileItem);
  });
}

/* =========================
CART SYSTEM
========================= */

let cart = JSON.parse(localStorage.getItem("cart")) || []

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart))
  updateCartCount()
}

/* ADD TO CART */

function addToCart(id){

  const product = allProducts.find(p => p._id === id)
  if(!product) return

  const existing = cart.find(item => item._id === id)

  if(existing){
    existing.qty += 1
  }else{
    cart.push({
      _id: product._id,
      name: product.name,
      price: product.price,
      image: product.mainImage,
      qty: 1
    })
  }

  saveCart()

}

/* CART COUNT (BADGE) */
function updateCartCount(){

  const count = cart.reduce((sum,item)=>sum+item.qty,0)

  const badge = document.getElementById("cartCount")

  if(!badge) return

  if(count === 0){
    badge.style.display = "none"
  }else{
    badge.style.display = "flex"
    badge.innerText = count

    /* small pop animation */
    badge.style.transform = "scale(1.2)"
    setTimeout(()=>{
      badge.style.transform = "scale(1)"
    },150)
  }

}
/* =========================
INIT
========================= */

loadHero()
loadProducts()
updateCartCount()
