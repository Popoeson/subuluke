<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subuluke Store</title>

<style>
/* =========================
THEME VARIABLES
========================= */
:root {
  --bg-gradient: linear-gradient(to bottom, #FFF8E7 0%, #FFD77A 100%);
  --bg: #FFF8E7;
  --header-gradient: linear-gradient(135deg, #E6A520 0%, #FFD77A 100%);
  --card: rgba(255,248,231,0.65);
  --text: #3a2a00;
  --muted: #777;
  --border: rgba(255,255,255,0.25);
  --accent: #E6A520;
  --softGold: #FFD77A;
}

body.dark {
  --bg-gradient: linear-gradient(to bottom, #121212 0%, #1A1A1A 100%);
  --bg: #0F0F0F;
  --header-gradient: linear-gradient(135deg, #121212 0%, #1A1A1A 100%);
  --card: rgba(26,26,26,0.65);
  --text: #F5F5F5;
  --muted: #BBBBBB;
  --border: rgba(255,255,255,0.15);
}

/* =========================
BASE
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-gradient);
  color: var(--text);
  transition: background 0.4s, color 0.4s;
}

/* =========================
HEADER
========================= */
.header {
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: var(--header-gradient);
  color: var(--text);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 12px rgba(122,74,0,0.25);
  border-radius: 0 0 12px 12px;
  transition: background 0.4s, color 0.4s;
}

.logo {
  font-size: 22px;
  font-weight: 700;
}

.header-right {
  display: flex;
  gap: 20px;
  align-items: center;
}

.theme-toggle {
  cursor: pointer;
  font-size: 18px;
}

/* =========================
HEADER ICONS
========================= */

.cart-icon{
cursor:pointer;
display:flex;
align-items:center;
}

.cart-icon svg{
stroke:var(--text);
}

/* =========================
HAMBURGER
========================= */

.hamburger{
display:none;
font-size:22px;
cursor:pointer;
}

/* =========================
MOBILE SIDEBAR
========================= */

.sidebar-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:none;
z-index:200;
}

.mobile-sidebar{
position:fixed;
top:0;
left:-280px;
width:260px;
height:100%;
background:var(--card);
backdrop-filter:blur(14px);
border-right:1px solid var(--border);
padding:20px;
transition:left .3s ease;
z-index:300;
}

.mobile-sidebar.active{
left:0;
}

.sidebar-overlay.active{
display:block;
}

.sidebar-header{
margin-bottom:20px;
}

/* =========================
MOBILE CATEGORY ITEMS
========================= */

.mobile-category{
padding:12px;
border-bottom:1px solid var(--border);
cursor:pointer;
}

.mobile-category:hover{
background:rgba(255,255,255,0.1);
}

/* =========================
CATEGORY TABS
========================= */
.categories {
  display: flex;
  gap: 12px;
  padding: 18px 24px;
  overflow: auto;
}

.category-pill {
  padding: 8px 18px;
  border-radius: 999px;
  cursor: pointer;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  color: var(--text);
  transition: all 0.3s;
}

.category-pill.active {
  background: var(--accent);
  color: white;
  border: none;
}


/* =========================
RESPONSIVE
========================= */

@media(max-width:768px){

.categories{
display:none;
}

.hamburger{
display:block;
}

}

/* =========================
HERO
========================= */
.hero {
  height: 500px;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  margin: 20px 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.hero-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: white;
  background: rgba(0,0,0,0.25);
  padding: 16px 32px;
  border-radius: 12px;
  backdrop-filter: blur(6px);
}

/* =========================
SECTION TITLE
========================= */
.section-title {
  text-align: center;
  padding: 60px 20px;
}

.section-title h2 {
  font-size: 36px;
  margin-bottom: 12px;
}

.section-title p {
  color: var(--muted);
}

/* =========================
PRODUCT GRID
========================= */
.products {
  max-width: 1280px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 28px;
  padding: 20px;
}

@media(max-width:1100px){ .products{ grid-template-columns: repeat(3,1fr); } }
@media(max-width:768px){ .products{ grid-template-columns: repeat(2,1fr); } }
@media(max-width:480px){ .products{ grid-template-columns: 1fr; } }

/* =========================
PRODUCT CARD (GLASS)
========================= */
.product-card {
  background: var(--card);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: background 0.4s, border 0.4s;
}

.product-image {
  position: relative;
}

.product-image img {
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;
}

/* BADGES */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(230,165,32,0.85);
  color: white;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  box-shadow: 0 2px 12px rgba(230,165,32,0.5);
}

.badge.sale {
  right: 10px;
  left: auto;
  background: rgba(214,40,40,0.85);
  box-shadow: 0 2px 12px rgba(214,40,40,0.5);
}

.badge.out {
  background: rgba(119,119,119,0.85);
  box-shadow: 0 2px 12px rgba(119,119,119,0.5);
}

/* PRODUCT BODY */
.product-body {
  padding: 18px;
}

.product-category {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.product-name {
  font-weight: 600;
  margin-bottom: 8px;
}

.price {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 4px;
}

.old-price {
  text-decoration: line-through;
  color: var(--muted);
  font-size: 14px;
}

.new-price {
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
}

.add-cart {
  margin-top: 14px;
  width: 100%;
  padding: 10px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
}

.add-cart:hover:not(.disabled) {
  background: rgba(0,0,0,0.8);
  box-shadow: 0 0 12px var(--softGold);
}

.add-cart.disabled {
  background: #999;
  cursor: not-allowed;
}

/* =========================
FOOTER
========================= */
.footer {
  margin-top: 80px;
  padding: 60px 20px;
  background: var(--header-gradient);
  color: var(--text);
  text-align: center;
  border-radius: 12px 12px 0 0;
  box-shadow: 0 -4px 12px rgba(122,74,0,0.25);
  transition: background 0.4s, color 0.4s;
}
</style>
</head>

<body>

<header class="header">

  <div class="logo">Subuluke</div>

  <div class="header-right">

    <!-- Cart Icon -->
    <div class="cart-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h7.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">

  <!-- Moon Icon -->
  <svg id="moonIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 
    7 7 0 0 0 21 12.79z"></path>
  </svg>

  <!-- Sun Icon -->
  <svg id="sunIcon" width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       style="display:none">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>

</div>
    <!-- Hamburger -->
    <div class="hamburger" onclick="toggleSidebar()">
      ☰
    </div>

  </div>

</header>

<!-- Desktop Categories -->
<div class="categories" id="categories"></div>

<!-- Mobile Sidebar -->
<div class="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="mobile-sidebar">

  <div class="sidebar-header">
    <h3>Categories</h3>
  </div>

  <div id="mobileCategories"></div>

</div>


<section class="hero" id="heroSection"></section>

<div class="section-title">
  <h2>Our Collection</h2>
  <p>Discover our latest pieces curated for you</p>
</div>

<section class="products" id="products"></section>

<footer class="footer">
  <p>© 2026 Subuluke Store</p>
</footer>

<script>

const API="https://subuluke.onrender.com"

let allProducts=[]

/* =========================
THEME TOGGLE
========================= */

function toggleTheme(){
  document.body.classList.toggle("dark")
  localStorage.setItem(
    "theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  )
}

if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark")
}

/* =========================
SIDEBAR
========================= */

function toggleSidebar(){
  document.querySelector(".mobile-sidebar").classList.add("active")
  document.querySelector(".sidebar-overlay").classList.add("active")
}

function closeSidebar(){
  document.querySelector(".mobile-sidebar").classList.remove("active")
  document.querySelector(".sidebar-overlay").classList.remove("active")
}

/* =========================
LOAD HERO
========================= */

async function loadHero(){
  try{

    const res = await fetch(API+"/api/hero-images")
    const heroes = await res.json()

    if(!heroes.length) return

    const activeHero = heroes.find(h=>h.isActive) || heroes[0]

    document.getElementById("heroSection").innerHTML = `
      <img src="${activeHero.imageUrl}">
      <div class="hero-overlay">
        <h1>Welcome to Subuluke</h1>
        <p>Explore our premium collection</p>
      </div>
    `

  }catch(err){
    console.log("Hero load error:",err)
  }
}

/* =========================
LOAD PRODUCTS
========================= */

async function loadProducts(){

  try{

    const res = await fetch(API+"/api/products")
    const products = await res.json()

    allProducts = products

    renderProducts(products)
    renderCategories(products)

  }catch(err){

    console.log("Product load error:",err)

  }

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(products){

  const container=document.getElementById("products")

  container.innerHTML=""

  products.forEach(p=>{

    const out = p.status==="out_of_stall"

    const card=document.createElement("div")

    card.className="product-card"

    card.innerHTML=`

      <div class="product-image">

        <img src="${p.mainImage}">

        ${p.featured ? '<div class="badge">FEATURED</div>' : ""}

        ${p.slashPrice>0 ? '<div class="badge sale">SALE</div>' : ""}

        ${out ? '<div class="badge out">OUT OF STALL</div>' : ""}

      </div>

      <div class="product-body">

        <div class="product-category">${p.category}</div>

        <div class="product-name">${p.name}</div>

        <div class="price">

          ${p.slashPrice>0 ? `<span class="old-price">₦${p.slashPrice}</span>` : ""}

          <span class="new-price">₦${p.price}</span>

        </div>

        <button class="add-cart ${out?'disabled':''}" ${out?'disabled':''}>

          ${out ? "Out of Stall" : "Add to Cart"}

        </button>

      </div>

    `

    container.appendChild(card)

  })

}

/* =========================
FILTER PRODUCTS
========================= */

function filterProducts(category){

  if(category==="All"){

    renderProducts(allProducts)

    return

  }

  const filtered = allProducts.filter(p=>p.category===category)

  renderProducts(filtered)

}

/* =========================
RENDER CATEGORIES
========================= */

function renderCategories(products){

  const cats = [...new Set(products.map(p=>p.category))]

  const container = document.getElementById("categories")
  const mobileContainer = document.getElementById("mobileCategories")

  container.innerHTML=""
  mobileContainer.innerHTML=""

  /* ALL CATEGORY */

  const allPill=document.createElement("div")
  allPill.className="category-pill active"
  allPill.innerText="All"

  allPill.onclick=()=>{

    document.querySelectorAll(".category-pill")
    .forEach(p=>p.classList.remove("active"))

    allPill.classList.add("active")

    filterProducts("All")

  }

  container.appendChild(allPill)

  const mobileAll=document.createElement("div")
  mobileAll.className="mobile-category"
  mobileAll.innerText="All"

  mobileAll.onclick=()=>{
    filterProducts("All")
    closeSidebar()
  }

  mobileContainer.appendChild(mobileAll)

  /* OTHER CATEGORIES */

  cats.forEach(c=>{

    const pill=document.createElement("div")
    pill.className="category-pill"
    pill.innerText=c

    pill.onclick=()=>{

      document.querySelectorAll(".category-pill")
      .forEach(p=>p.classList.remove("active"))

      pill.classList.add("active")

      filterProducts(c)

    }

    container.appendChild(pill)

    const mobileItem=document.createElement("div")
    mobileItem.className="mobile-category"
    mobileItem.innerText=c

    mobileItem.onclick=()=>{
      filterProducts(c)
      closeSidebar()
    }

    mobileContainer.appendChild(mobileItem)

  })

}

/* =========================
INIT
========================= */

loadHero()
loadProducts()

</script>

</body>
</html>
