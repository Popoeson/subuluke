<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subuluke</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================
THEME
========================= */

:root{
--bg:#FFF8E7;
--header:#ffffff;
--sidebar:#ffffff;
--card:#ffffff;
--text:#333;
--muted:#777;
--border:#eee;
--accent:#E6A520;
--softGold:#FFD77A;
}

body.dark{
--bg:#0F0F0F;
--header:#121212;
--sidebar:#111;
--card:#1A1A1A;
--text:#F5F5F5;
--muted:#BBBBBB;
--border:#2A2A2A;
}

/* =========================
BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui, -apple-system, sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

/* =========================
INTRO SCREEN
========================= */

#introScreen{
position:fixed;
inset:0;
z-index:9999;

display:flex;
align-items:center;
justify-content:center;

background:var(--bg);
color:var(--text);

transition:opacity .8s ease, visibility .8s ease;
}

#introScreen.hide{
opacity:0;
visibility:hidden;
}

/* =========================
INTRO CONTENT
========================= */

.intro-content{
text-align:center;
}

/* WELCOME */

.welcome{
font-size:48px;
font-weight:700;
letter-spacing:5px;

transform:translateY(-100vh);
animation:slideDown 1s ease forwards;
}

/* TO */

.to{
font-size:26px;
letter-spacing:6px;
margin-top:8px;

transform:translateX(100vw);
animation:slideRight 1s ease forwards;
animation-delay:.8s;
}

/* BRAND */

.brand{
font-size:58px;
font-weight:700;
margin-top:6px;

color:var(--accent);

opacity:0;
animation:fadeIn 1s ease forwards;
animation-delay:1.6s;
}

/* =========================
LOADING TEXT
========================= */

.loading-text{
margin-top:26px;
font-size:14px;
color:var(--muted);

opacity:0;
animation:fadeIn .8s ease forwards;
animation-delay:2.2s;
}

/* =========================
BOUNCING DOTS
========================= */

.dots{
margin-top:10px;
display:flex;
justify-content:center;
gap:6px;

opacity:0;
animation:fadeIn .8s ease forwards;
animation-delay:2.4s;
}

.dots span{
width:8px;
height:8px;
border-radius:50%;
background:var(--accent);

animation:bounce 1.2s infinite ease-in-out;
}

.dots span:nth-child(2){
animation-delay:.2s;
}

.dots span:nth-child(3){
animation-delay:.4s;
}

/* =========================
ANIMATIONS
========================= */

@keyframes slideDown{
to{
transform:translateY(0);
}
}

@keyframes slideRight{
to{
transform:translateX(0);
}
}

@keyframes fadeIn{
to{
opacity:1;
}
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0);
}
40%{
transform:scale(1);
}
}

/* =========================
MAIN HOMEPAGE
========================= */

#mainContent{
opacity:0;
transition:opacity 1s ease;
padding:40px;
text-align:center;
}

#mainContent.show{
opacity:1;
}

/* =========================
MOBILE INTRO
========================= */

@media(max-width:768px){

.welcome{
font-size:36px;
}

.brand{
font-size:42px;
}

}

/* =========================
HEADER
========================= */

.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;

transform:translateY(-100%);
animation:headerDrop 0.9s ease forwards;
animation-delay:0.2s;

/* Glass effect */
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-bottom:1px solid rgba(255,255,255,0.15);
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

/* Dark glass */

body.dark .header{
background:rgba(20,20,20,0.65);
border-bottom:1px solid rgba(255,255,255,0.06);
}

/* =========================
HEADER INNER
========================= */

.header-inner{
max-width:1200px;
margin:auto;
padding:14px 20px;

display:flex;
align-items:center;
justify-content:space-between;
}

/* =========================
LOGO
========================= */

.logo{
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--text); /* Use text color in light mode */
  
  opacity:0;
  animation:fadeIn 0.8s ease forwards;
  animation-delay:0.6s;

  /* subtle glow for dark mode only */
  text-shadow:0 0 8px rgba(255,215,122,0.35);
}

/* In dark mode, logo uses soft gold */
body.dark .logo{
  color:var(--softGold);
}

/* =========================
ICONS
========================= */

.header-icons{
  display:flex;
  align-items:center;
  gap:18px;
}

/* ICON STYLE */

.icon{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
  color:var(--text); /* default light mode */

  opacity:0;
  animation:fadeIn 0.8s ease forwards;

  transition:.25s ease;
}

.icon:hover{
  transform:scale(1.12);
}

/* Hover color: accent glow in light mode, softGold in dark mode */
body:not(.dark) .icon:hover{
  color:var(--accent);
}

body.dark .icon{
  color:var(--softGold);
}

body.dark .icon:hover{
  color:var(--softGold);
}

/* STAGGER ANIMATION */

.cart-icon{
  animation-delay:0.8s;
}

.theme-toggle{
  animation-delay:1s;
}

/* =========================
THEME ICON CONTROL
========================= */

#sunIcon{
display:none;
}

/* =========================
HEADER ANIMATION
========================= */

@keyframes headerDrop{
to{
transform:translateY(0);
}
}

/* =========================
MOBILE HEADER
========================= */

@media(max-width:768px){

.header-inner{
padding:12px 16px;
}

.logo{
font-size:18px;
}

.icon{
font-size:17px;
}

}


/* =========================
HERO SECTION (GLASSMORPHISM CARD)
===========================*/
.hero {
  width: 90vw; /* slightly narrower than viewport for card effect */
  max-width: 1200px;
  height: clamp(420px, 70vh, 700px); /* taller vertically */
  
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  border-radius: 24px;

  /* Glassmorphism */
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.25);

  overflow: hidden;
  z-index: 1;
  transition: background 0.3s ease;
}

/* Dark mode glass */
body.dark .hero {
  background: rgba(20, 20, 20, 0.35);
}

/* TRACK (slides inside hero) */
.hero-track {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* SLIDES */
.hero-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.8s ease;
}

.hero-slide.active {
  opacity: 1;
  z-index: 1;
}

.hero-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  border-radius: 24px;
}

/* NAVIGATION */
.hero-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 46px;
  height: 46px;
  border: none;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.35);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  z-index: 2;
  backdrop-filter: blur(6px);
  transition: background 0.3s ease;
}

.hero-prev { left: 20px; }
.hero-next { right: 20px; }

.hero-arrow:hover {
  background: rgba(0,0,0,0.6);
}

/* DOTS */
.hero-dots {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 2;
}

.hero-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: all 0.3s ease;
}

.hero-dot.active {
  background: #E6A520;
  transform: scale(1.2);
}

/* MOBILE FIX */
@media(max-width:768px) {
  .hero {
    width: 95vw;
    height: 360px;
  }
  .hero-slide img {
    border-radius: 20px;
  }
  .hero-arrow {
    width: 34px;
    height: 34px;
    font-size: 18px;
  }
}

/* DESKTOP LARGE SCREENS */
@media(min-width:1024px) {
  .hero-slide img {
    object-fit: cover;
    background: transparent;
  }
}

</style>
</head>

<body>

<!-- =========================
GREETING INTRO
========================= -->

<div id="introScreen">

<div class="intro-content">

<h1 class="welcome">WELCOME</h1>

<h2 class="to">TO</h2>

<h1 class="brand">Subuluke</h1>

<p class="loading-text">
Please wait while we load up the store for you
</p>

<div class="dots">
<span></span>
<span></span>
<span></span>
</div>

</div>

</div>

<!-- =========================
MAIN CONTENT (HOMEPAGE)
========================= -->
<div id="mainContent">

<!-- ==================
       HEADER
================ -->

<header class="header" id="mainHeader">

  <div class="header-inner">

    <!-- LOGO -->
    <div class="logo">Subuluke</div>

    <!-- ICONS -->
    <div class="header-icons">

      <!-- CART -->
      <a href="cart.html" class="icon cart-icon">
        <i class="fa-solid fa-cart-shopping"></i>
      </a>

      <!-- THEME TOGGLE -->
      <button class="icon theme-toggle" onclick="toggleTheme()">

        <i class="fa-solid fa-moon" id="moonIcon"></i>
        <i class="fa-solid fa-sun" id="sunIcon"></i>

      </button>

    </div>

  </div>

</header>


<!-- ========== HERO SECTION ========== -->
<section id="heroSection" class="hero">
  <div id="heroTrack" class="hero-track"></div>

  <!-- Hero navigation dots -->
  <div id="heroDots" class="hero-dots"></div>

  <!-- Previous / Next buttons -->
  <button id="heroPrev" class="hero-arrow hero-prev"><i class="fa-solid fa-chevron-left"></i></button>
  <button id="heroNext" class="hero-arrow hero-next"><i class="fa-solid fa-chevron-right"></i></button>
</section>

</div>



<script>

/* =========================
API
========================= */

const API = "https://subuluke.onrender.com"


/* =========================
WAKE SERVER
========================= */

async function wakeServer(){

try{

await fetch(API + "/api/health")

}catch(err){

console.log("Server wake failed")

}

}


/* =========================
INTRO + LOADING LOGIC
========================= */

window.addEventListener("load", async ()=>{

const intro = document.getElementById("introScreen")
const main = document.getElementById("mainContent")

/* animation minimum duration */

const animationDelay = new Promise(res => setTimeout(res, 3500))

/* server wake */

const serverWake = wakeServer()

/* wait for both */

await Promise.all([animationDelay, serverWake])

/* fade intro */

intro.classList.add("hide")

/* reveal homepage */

setTimeout(()=>{

main.classList.add("show")

},800)

})

/* =========================
THEME TOGGLE
========================= */

function toggleTheme(){

document.body.classList.toggle("dark")

const isDark = document.body.classList.contains("dark")

localStorage.setItem("theme", isDark ? "dark" : "light")

updateThemeIcon()

}

function updateThemeIcon(){

const moon = document.getElementById("moonIcon")
const sun = document.getElementById("sunIcon")

if(!moon || !sun) return

if(document.body.classList.contains("dark")){

moon.style.display = "none"
sun.style.display = "inline-block"

}else{

moon.style.display = "inline-block"
sun.style.display = "none"

}

}

/* LOAD SAVED THEME */

if(localStorage.getItem("theme") === "dark"){

document.body.classList.add("dark")

}

updateThemeIcon()

/* ========== HERO SECTION SCRIPT ========== */
let heroIndex = 0;
let heroTimer;

/* -------------------------
LOAD HERO IMAGES
------------------------- */
async function loadHero() {
  try {
    const res = await fetch(API + "/api/hero-images");
    const heroes = await res.json();

    // Only active heroes
    const activeHeroes = heroes.filter(h => h.isActive);
    if (!activeHeroes.length) return;

    const track = document.getElementById("heroTrack");
    const dotsContainer = document.getElementById("heroDots");

    if (!track || !dotsContainer) return;

    track.innerHTML = "";
    dotsContainer.innerHTML = "";

    activeHeroes.forEach((hero, i) => {
      // Create slide
      const slide = document.createElement("div");
      slide.className = "hero-slide";
      if (i === 0) slide.classList.add("active");

      // Add image only (no overlay)
      slide.innerHTML = `<img src="${hero.imageUrl}" loading="${i===0 ? "eager" : "lazy"}">`;
      track.appendChild(slide);

      // Create dot
      const dot = document.createElement("div");
      dot.className = "hero-dot";
      if (i === 0) dot.classList.add("active");
      dot.onclick = () => goToHero(i);
      dotsContainer.appendChild(dot);
    });

    startHeroSlider();

  } catch (err) {
    console.log("Hero load error:", err);
  }
}

/* -------------------------
SHOW SLIDE
------------------------- */
function showHero(index) {
  const slides = document.querySelectorAll(".hero-slide");
  const dots = document.querySelectorAll(".hero-dot");

  slides.forEach(s => s.classList.remove("active"));
  dots.forEach(d => d.classList.remove("active"));

  slides[index]?.classList.add("active");
  dots[index]?.classList.add("active");
}

/* -------------------------
NEXT / PREV HERO
------------------------- */
function nextHero() {
  const slides = document.querySelectorAll(".hero-slide");
  if (!slides.length) return;
  heroIndex = (heroIndex + 1) % slides.length;
  showHero(heroIndex);
}

function prevHero() {
  const slides = document.querySelectorAll(".hero-slide");
  if (!slides.length) return;
  heroIndex = (heroIndex - 1 + slides.length) % slides.length;
  showHero(heroIndex);
}

function goToHero(index) {
  heroIndex = index;
  showHero(heroIndex);
}

/* -------------------------
AUTO SLIDER
------------------------- */
function startHeroSlider() {
  clearInterval(heroTimer);
  heroTimer = setInterval(nextHero, 6000);
}

/* -------------------------
BUTTON EVENTS
------------------------- */
document.getElementById("heroNext")?.addEventListener("click", nextHero);
document.getElementById("heroPrev")?.addEventListener("click", prevHero);

/* -------------------------
TOUCH SWIPE (MOBILE)
------------------------- */
const hero = document.getElementById("heroSection");
if (hero) {
  let touchStartX = 0;
  hero.addEventListener("touchstart", e => { touchStartX = e.changedTouches[0].screenX; });
  hero.addEventListener("touchend", e => {
    const touchEndX = e.changedTouches[0].screenX;
    if (touchEndX < touchStartX - 50) nextHero();
    if (touchEndX > touchStartX + 50) prevHero();
  });
}

/* -------------------------
INITIALIZATION
------------------------- */
window.addEventListener("load", async () => {
  const heroSection = document.getElementById("heroSection");
  setTimeout(() => {
    if(heroSection) heroSection.style.animationPlayState = "running";
  }, 1800); // after header animation
  loadHero();
});

</script>

</body>
</html>
